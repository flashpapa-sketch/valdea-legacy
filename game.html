        <div class="sgrid">
          <div class="scard"><div class="sn">技術点 SKILL</div><div class="sh">1d6+6</div><div class="sv"><div class="sg"><div class="sl">初期</div><input class="si" id="ski" type="number" min="1" max="20"></div><span class="sep">/</span><div class="sg"><div class="sl">現在</div><div class="sar"><button class="sa" data-s="sk" data-d="-1">－</button><input class="si" id="skc" type="number" min="0" max="30"><button class="sa" data-s="sk" data-d="1">＋</button></div></div></div><button class="sr" data-s="sk">振る</button></div>

          <div class="scard"><div class="sn">運勢点 LUCK</div><div class="sh">1d6+6</div><div class="sv"><div class="sg"><div class="sl">初期</div><input class="si" id="lki" type="number" min="1" max="20"></div><span class="sep">/</span><div class="sg"><div class="sl">現在</div><div class="sar"><button class="sa" data-s="lk" data-d="-1">－</button><input class="si" id="lkc" type="number" min="0" max="20"><button class="sa" data-s="lk" data-d="1">＋</button></div></div></div><button class="sr" data-s="lk">振る</button></div>
        </div>
      </div>

      <div class="ss"><h4>所持金 / 食料</h4><div class="gfr"><div class="gfb"><div class="gfl">金貨</div><div class="gfc"><button class="gfa" data-id="gold" data-d="-1">－</button><input class="gfi" id="gold" type="number" value="3" min="0" max="999"><button class="gfa" data-id="gold" data-d="1">＋</button><span class="gfu">枚</span></div></div><div class="gfb"><div class="gfl">食料</div><div class="gfc"><button class="gfa" data-id="food" data-d="-1">－</button><input class="gfi" id="food" type="number" value="0" min="0" max="10"><button class="gfa" data-id="food" data-d="1">＋</button><span class="gfu">個</span></div></div></div></div>

<script>
var S = {"一": {"id": "一", "num": "一", "text": ["ヴァルデアの荒野に、風が砂埃を巻き上げていた。", "あなたはその風に背を向けながら、地平線に浮かぶ街の輪郭を眺めていた。ドーラン。辺境の交易街。名もなき旅人が最後に辿り着く場所、あるいは新たな旅の始まりの場所と呼ばれている。財布の中身は金貨三枚。背中には剣一本。それがあなたの全財産だった。", "左手の甲が、じわりと熱を帯びた。", "またこれだ、とあなたは思う。生まれた時からそこにある古代文字の紋章。旅の途中で何人かの学者に見せたが、誰も首を傾げるだけだった。ただ一人、北の廃村で出会った老婆だけが顔色を変えた。「その印を持つ者に会ったことがある」と彼女は囁いた。「黄金時代の遺物から聞いた話だ。猿の右手は願いを叶える。だが運命を曲げようとする者には、必ず災いが返ってくる。叶えたいことがあるなら、言葉を慎重に選べ」。老婆はそれ以上何も言わなかった。", "あなたは左手を握り締め、ドーランの街門をくぐった。"], "note": "", "end": "", "choices": [{"next": "四十七", "label": "四十七へ進め。"}]}, "十二": {"id": "十二", "num": "十二", "text": ["「何か御用かい」", "マグダは布巾で杯を拭きながら、あなたを一瞥した。愛想はないが、この街のことなら何でも知っているという噂の女将だ。", "「最近、この街で変わったことはなかったか」とあなたは尋ねる。", "マグダは少しの間だけ手を止めた。「変わったこと、ね」。彼女は声を低くした。「三週間前から、ザル＝カラムの廃墟に夜ごと青白い光が灯るようになった。昔から呪われた場所だと言われているのに、この頃は腕に覚えのある連中がやたらと集まってきている。あんたも同じ口かい？」", "マグダの目があなたの左手に一瞬止まる。しかし彼女は何も言わなかった。"], "note": "", "end": "", "choices": [{"next": "三十五", "label": "「情報の礼に一杯奢ろう」と言うなら金貨一枚を払い、三十五へ進め。"}, {"next": "六十一", "label": "「神殿のことを聞きたい」と言うなら六十一へ進め。"}, {"next": "十三", "label": "もっと詳しく話を聞くなら十三へ進め。"}, {"next": "八十三", "label": "三人組の男たちの方が気になるなら八十三へ進め。"}]}, "二十六": {"id": "二十六", "num": "二十六", "text": ["二階の部屋は狭かったが、清潔だった。", "藁のベッドに横になり、あなたは天井の染みを眺める。金貨二枚。明日には何か仕事を見つけなければならない。左手の甲がまた熱を帯びてきた。あなたは目を閉じた。", "夢を見た。", "暗闇の中に、巨大な扉があった。扉には無数の古代文字が刻まれていた。その中の一つが、あなたの左手の紋章と同じ形をしていた。扉の向こうから、何かの声が聞こえる。言葉は聞き取れない。しかし確かに、あなたの名を呼んでいた。", "目を覚ますと夜半だった。窓の外に人影が見えた。"], "note": "金貨一枚を失い、残りの金貨の数を冒険者シートに記録せよ。体力点を三点回復せよ（初期値を超えることはできない）。", "end": "", "choices": [{"next": "十一", "label": "窓から路地を確認するなら十一へ進め。"}, {"next": "四十七", "label": "そのまま眠り続けるなら朝まで休み体力点を三点回復して四十七へ戻れ。"}]}, "三十五": {"id": "三十五", "num": "三十五", "text": ["金貨一枚をカウンターに置くと、マグダは素早くそれを懐にしまい、杯に酒を注いだ。安い麦酒だったが、長い旅の後には十分だった。", "「もう一つ聞いていいか」とあなたは言う。「この街に神殿はあるか」", "マグダの表情が、わずかに変わった。「ある。街の北の端だ。ただし」と彼女は声をさらに低くした。「この三ヶ月、司祭が誰とも会おうとしない。ザル＝カラムの光が灯り始めてから、ぴたりと扉を閉ざしてしまった」", "あなたは麦酒を一口飲んだ。冷たくて、少し苦かった。", "「そのドワーフの老人は何者だ」とあなたは三人組のテーブルに目を向けながら言う。", "「ゴルム爺さんか」マグダは肩をすくめた。「元は王国の兵士だったらしい。今は何でも屋だ。ただ、あの爺さんがこの街に来るのはいつも碌でもない時だよ」"], "note": "", "end": "", "choices": [{"next": "八十三", "label": "情報に礼を言い、三人組に近づくなら八十三へ進め。"}, {"next": "六十一", "label": "神殿へ向かうなら六十一へ進め。"}, {"next": "二十六", "label": "今夜は部屋で休むなら二十六へ進め。"}]}, "四十七": {"id": "四十七", "num": "四十七", "text": ["街の中心にある「錆びた剣亭」は、ドーランで唯一まともな酒場だった。", "扉を押し開けると、煙草の煙と獣脂の臭いが鼻をついた。薄暗い店内に、十人ほどの客が思い思いに酒を飲んでいる。カウンターの奥では、ホビットの女将が胡散臭そうにあなたを見ている。腰まで届く赤茶けた巻き毛と、値踏みするような細い目が特徴的だ。", "隅のテーブルでは三人組の男たちが声を潜めて話し込んでいる。人間が二人とドワーフが一人。地図らしきものをテーブルに広げているが、あなたが視線を向けると素早く丸めてしまった。", "二階への階段の傍には「本日の空き室　残り一」と書かれた木の札が下がっている。財布には金貨三枚。一泊の宿代は金貨一枚のはずだ。"], "note": "技術点、体力点、運勢点の初期値をまだ決めていなければ、冒険者シートのダイスローラーで今すぐ決定せよ。冒険者シートに記録すること。", "end": "", "choices": [{"next": "十二", "label": "女将のマグダに話しかけるなら十二へ進め。"}, {"next": "八十三", "label": "三人組の男たちに近づくなら八十三へ進め。"}, {"next": "六", "label": "酒場の前の路地を覗くなら六へ進め。"}, {"next": "二", "label": "先に街門の掲示板を確認するなら二へ進め。"}, {"next": "二十六", "label": "二階の部屋を借りて休むなら二十六へ進め。"}]}, "五十八": {"id": "五十八", "num": "五十八", "text": ["老ドワーフは名をゴルムといった。", "「五十年前、私はこの荒野で戦った」と彼は低い声で言った。「ザル＝カラムがまだ封印されていた頃だ。あの遺跡には、黄金時代の星脈術が眠っている。そして今、その封印が解けかけている」", "若い人間の二人組――兄弟らしい――は無言でテーブルの木目を眺めていた。", "「あなたの左手の紋章」とゴルムは続けた。「それは古代の鍵だ。どんな学者に見せても分からなかっただろう。なぜならその紋章の意味を知る者は、この世にもう三人しかいないからだ」", "あなたは左手を握った。「三人とは」", "「一人は私だ」ゴルムは戦斧の柄を静かに撫でた。「一人はザル＝カラムの最深部にいる。そしてもう一人は――」", "彼の目が、扉の方を向いた。", "何者かが酒場に入ってきた。フードを深く被った人物だ。ゴルムの表情が、石のように固まった。"], "note": "「ゴルムから鍵の話を聞いた」と冒険者シートのメモ欄に記録せよ。", "end": "", "choices": [{"next": "九十二", "label": "フードの人物に注目するなら九十二へ進め。"}, {"next": "十五", "label": "ゴルムの過去をもっと聞くなら十五へ進め。"}]}, "六十一": {"id": "六十一", "num": "六十一", "text": ["神殿は街の北の端にあった。", "石造りの質素な建物で、かつては白く塗られていたらしいが、今は煤けて灰色になっている。扉は固く閉ざされていた。ノックをすると、しばらく沈黙があり、やがて細く扉が開いた。", "老いた目がのぞいた。司祭だ。七十は超えているだろう。しかしその目には、恐怖と何か別の感情が混じっていた。", "「何の用だ」と彼は言った。声が震えている。", "「情報を求めている。ザル＝カラムについて」", "司祭の顔が蒼白になった。扉をさらに閉めようとする。しかしあなたが左手を上げた瞬間、彼は動きを止めた。その目が、紋章に釘付けになっていた。", "「……中に入りなさい」と司祭は囁いた。「見られてはならない」"], "note": "「神殿の司祭と接触済み」と冒険者シートのメモ欄に記録せよ。", "end": "", "choices": [{"next": "百七", "label": "中に入るなら百七へ進め。"}, {"next": "四十七", "label": "罠を疑い、断るなら四十七へ戻れ。"}]}, "八十三": {"id": "八十三", "num": "八十三", "text": ["三人組は、あなたが近づくと警戒の色を見せた。", "人間の二人組は三十代と思しき男で、旅慣れた装備をしている。ドワーフの方は白い顎鬚を蓄えた老人で、腰に立派な戦斧を提げていた。", "「何の用だ」と若い方の人間が言う。敵意のある声だ。", "「同じ旅人として、情報交換でもどうかと思ってな」とあなたは答える。", "老ドワーフがじっとあなたの左手を見た。その目が、わずかに見開かれる。「……その紋章」と彼は呟いた。「どこで手に入れた」", "「生まれた時からある」", "三人は顔を見合わせた。何かを決断したように、老ドワーフが口を開く。「座れ。話がある」"], "note": "この選択をした場合、「ゴルムたちと接触済み」と冒険者シートのメモ欄に記録せよ。", "end": "", "choices": [{"next": "五十八", "label": "老ドワーフの話を聞くなら五十八へ進め。"}, {"next": "四十七", "label": "罠かもしれないと警戒し、断るなら四十七へ戻れ。"}]}, "九十二": {"id": "九十二", "num": "九十二", "text": ["フードの人物はゆっくりと歩いてきた。", "他の客たちは気にも留めていない。しかしゴルムだけが、微動だにせず視線を追い続けていた。人物はあなたたちのテーブルを通り過ぎ――そしてすぐ背後で足を止めた。", "「ゴルム」と静かな声がした。女の声だ。「久しぶりね」", "老ドワーフは深く息をついた。「シラ。なぜここに」", "フードが外れた。長い銀髪と、時間の重さを湛えた緑の瞳。エルフだ。人間の目には三十代に見えるだろうが、その佇まいは何百年もの歳月を感じさせた。", "彼女の視線があなたの左手に止まった。驚きの色はなかった。まるで――最初から知っていたかのように。", "「あなたが来ることは分かっていた」とシラは言った。「黄金時代の終わりに、そう記されていたから」", "ゴルムが低く唸った。「余計なことを言うな」", "「もう時間がない」シラはゴルムを遮った。そしてあなたを真っ直ぐに見た。「今夜、ザル＝カラムで何かが起きる。あなたはそこへ行くことになる。止められない」"], "note": "「シラと接触済み」と冒険者シートのメモ欄に記録せよ。", "end": "", "choices": [{"next": "百七", "label": "シラの言葉の意味を問うなら百七へ進め。"}, {"next": "三十五", "label": "ゴルムに詳細を聞くなら三十五へ進め。"}]}, "百七": {"id": "百七", "num": "百七", "text": ["司祭の名はオルドといった。", "神殿の奥の小部屋に通されると、彼は震える手で古い羊皮紙を広げた。黄ばんで端が崩れかけているが、そこに描かれた図はまだ鮮明だった。ザル＝カラムの地図だ。そして中央に、あなたの左手の紋章と同じ形が刻まれていた。", "「三百年前」とオルドは言った。「黄金時代が終わった夜、一人の賢者がこれを私の師に預けた。いつかこの紋章を持つ者が現れる。その者にこれを渡せ、と」", "老司祭は羊皮紙をあなたに手渡した。", "「ザル＝カラムには三つの封印がある」と彼は続けた。「その鍵がその紋章だ。しかし警告がある」オルドの目が暗くなった。「封印を解く者は、必ず選択を迫られる。力を継ぐか。力に飲まれるか。あるいは――力ごと、すべてを葬るか」"], "note": "「ザル＝カラムの地図」を手に入れた。冒険者シートの所持品欄に記録せよ。", "end": "", "choices": [{"next": "百二十三", "label": "地図についてさらに詳しく聞くなら百二十三へ進め。"}, {"next": "十八", "label": "神殿の生き残りに会わせてもらうなら十八へ進め。"}, {"next": "百三十八", "label": "今夜すぐにザル＝カラムへ向かうなら百三十八へ進め。"}, {"next": "二十六", "label": "一度宿に戻って準備を整えるなら二十六へ進め。"}]}, "百二十三": {"id": "百二十三", "num": "百二十三", "text": ["オルドは羊皮紙の端を指でなぞった。", "「ザル＝カラムには三つの層がある」と彼は言った。「地上層は番人ゴーレムが守っている。黄金時代の賢者たちが仕掛けた罠だ。生半可な冒険者はここで命を落とす」", "「地下一層には研究区画がある。かつて賢者たちが星脈術を研究した場所だ。しかし崩壊の夜、何かが封印されたとも聞く。私には詳しいことは分からない」", "老司祭の声が低くなった。「地下二層には神殿がある。星脈術の祭壇だ。その紋章があれば、祭壇に触れることができる。しかし――触れるかどうかは、あなた自身が決めることだ。私には勧める資格も、止める資格もない」", "オルドはあなたの目を真っ直ぐ見た。「一つだけ言える。あの場所に入ったら、引き返せると思うな。ザル＝カラムはあなたを変える。良い方向にも、悪い方向にも」", "老司祭は立ち上がり、小部屋の奥から小さな瓶を取り出した。中に琥珀色の液体が入っている。「回復薬だ。一度だけ使える。体力点を六点回復する」"], "note": "「回復薬」を手に入れた。冒険者シートの所持品欄に記録せよ。", "end": "", "choices": [{"next": "百三十八", "label": "今夜すぐにザル＝カラムへ向かうなら百三十八へ進め。"}, {"next": "二十六", "label": "一度宿に戻って休むなら二十六へ進め。"}]}, "百三十八": {"id": "百三十八", "num": "百三十八", "text": ["夜のドーランは静かだった。", "あなたは街門を出た。荒野の闇の中に、遠く青白い光が灯っている。ザル＝カラムだ。地図によれば、ここから三時間ほどの距離だ。", "背後で足音がした。振り返ると、ゴルムが立っていた。戦斧を背負い、旅装束に身を包んでいる。", "「一人で行くつもりか」と老ドワーフは言った。", "「止めるつもりか」", "「逆だ」ゴルムは鼻を鳴らした。「儂も行く。あの遺跡には、昔の借りがある」", "シラも闇の中から現れた。「私も行く」と彼女は静かに言った。「三百年、この日を待っていた」", "道は三つに分かれている。地図によれば、それぞれ荒野・森・古代街道を通る。ゴルムは荒野ルートを薦める。シラは森ルートを薦める。どちらも一理ある。"], "note": "", "end": "", "choices": [{"next": "五百一", "label": "出発前に廃村の調査をするなら五百一へ進め。"}, {"next": "百四十五", "label": "荒野ルートを行くなら百四十五へ進め。"}, {"next": "百八十八", "label": "森ルートを行くなら百八十八へ進め。"}, {"next": "百九十四", "label": "古代街道を行くなら百九十四へ進め。"}]}, "百四十五": {"id": "百四十五", "num": "百四十五", "text": ["街門を出て間もなく、道の真ん中に人影が立っていた。", "大きい。人間の倍はあろうかという巨躯だ。黒鉄の鎧に身を包み、背丈を超える大剣を地に突き立てている。オークだ。しかし普通のオークではない。その目に、知性と残忍さが同居していた。", "「待っていたぞ」と巨躯は言った。声は地の底から響くようだった。「紋章の持ち主よ。我が主ヴォルカネスの命だ。ここで死ね」", "ゴルムが低く唸った。「グラッハだ。ヴォルカネスの先兵。荒野の処刑人と呼ばれた男だ」", "シラが囁いた。「五十年前に死んだはずだった。よみがえらされたのか」", "逃げ道はない。グラッハが大剣を構えた。", "グラッハが崩れ落ちた。黒鉄の鎧が砕け、その下から砂がこぼれ落ちる。実体のない、砂でできた存在だったのだ。", "ゴルムが深く息をついた。「よくやった」と彼は言った。その声には、驚きが混じっていた。"], "note": "【中ボス戦】荒野の処刑人「グラッハ」との戦闘を行え。グラッハ：技術点十／体力点十六。グラッハは偶数ラウンド（第二・四・六…ラウンド）に通常ダメージに加えてさらに一点の追加ダメージを与える。「ロットンのつるぎ」を持っている場合、追加ダメージを無効化できる。猿の右手をまだ使っていない場合、このタイミングで使用できる。使うなら四百二十八へ進め。", "end": "", "choices": [{"next": "百五十二", "label": "荒野ルートを進むなら百五十二へ進め。"}, {"next": "百八十八", "label": "森ルートへ変更するなら百八十八へ進め。"}, {"next": "百九十四", "label": "古代街道へ変更するなら百九十四へ進め。"}, {"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}]}, "百五十二": {"id": "百五十二", "num": "百五十二", "text": ["荒野を三十分ほど進んだところで、焚き火の明かりが見えた。", "オークの野営地だ。七、八体はいるだろう。全員が武装している。通り道を塞ぐように陣取っていた。ゴルムが低く唸った。「面倒なことになった」", "シラが囁いた。「オークの族長は交渉に応じることもある。ただし、舐められたら終わりだ」", "ゴルムは戦斧の柄を握った。「儂は正面突破でいい」", "左手の紋章がわずかに熱を帯びた。"], "note": "", "end": "", "choices": [{"next": "百六十七", "label": "交渉を試みるなら百六十七へ進め。"}, {"next": "百七十九", "label": "正面から戦うなら百七十九へ進め。"}, {"next": "百八十八", "label": "迂回路を探すなら運試しを行え。運勢点以下ならば百八十八へ進め。失敗したならば百七十九へ進め。"}]}, "百六十七": {"id": "百六十七", "num": "百六十七", "text": ["族長のオークは頭一つ分背が高く、古い傷跡が顔を横切っていた。", "あなたは武器を収め、両手を広げて近づいた。族長の目が細くなる。仲間たちが武器を構える。", "「通してほしい」とあなたは言った。「ザル＝カラムへ行く」", "族長は長い沈黙の後、低い声で笑った。「死にたいのか、人間」", "「かもしれない」とあなたは答えた。「だがあの遺跡が目覚めれば、この荒野も飲み込まれる。あなたたちの野営地も例外ではない」", "また沈黙。族長はあなたの左手を見た。その目に、何か認識の光が走った。", "「……行け」と族長は低く言った。「ただし、戻ってくる時は別の道を通れ。次は通さない」"], "note": "技術点に一点を加えよ。この判断が、あなたを少し成長させた。", "end": "", "choices": [{"next": "百八十八", "label": "百八十八へ進め。"}]}, "百七十九": {"id": "百七十九", "num": "百七十九", "text": ["戦闘は激しかった。", "オークたちは強く、素早かった。ゴルムの戦斧が唸り、シラの短剣が閃く。あなたも剣を抜いた。"], "note": "オーク三体と戦闘を行え。それぞれの技術点は七、体力点は八である。一体ずつ順番に戦え。一体を倒すごとに次のオークと戦う。戦闘中に食料や回復薬を使用することはできない。オーク：技術点七／体力点八（三体）／経験値：一体につき一点（合計三点）。冒険者シートの経験値欄に記録し、合計が三点に達したならLv.2「浮足立つ冒険者」へ昇格し技術点＋一せよ。七点に達したならLv.3「豪傑の勇者」へ昇格し体力点最大値＋四せよ。十二点に達したならLv.4「ヴァルデアのレジェンド」へ昇格し運勢点＋一・技術点＋一せよ。", "end": "", "choices": [{"next": "百八十八", "label": "全員を倒したなら百八十八へ進め。"}, {"next": "百八十八", "label": "体力点が三点以下になったなら、今すぐ食料か回復薬を使用してもよい。その後百八十八へ進め。"}, {"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}]}, "百八十八": {"id": "百八十八", "num": "百八十八", "text": ["森の入口に着いたのは夜半過ぎだった。", "古い木々が頭上を覆い、星が見えなくなった。暗闇の中で、シラが先導する。エルフの目は夜でも見えるらしい。", "しばらく進むと、木々の間に淡い光が見えた。ゴルムが足を止めた。「エルフの隠れ里か」と彼は呟いた。どこか苦い声だった。", "「寄っていく必要はない」とシラは言った。しかしその声には迷いがあった。", "あなたは光の方向を見た。何かが引き寄せている。左手の紋章ではない。もっと単純な、人間的な好奇心だ。"], "note": "", "end": "", "choices": [{"next": "二百三", "label": "エルフの里に立ち寄る場合は体力点を四点回復し（初期値を超えることはできない）、「エルフの里に立ち寄った」とメモ欄に記録してから二百三へ進め。"}, {"next": "二百三", "label": "時間を節約してそのまま進む場合は二百三へ進め。"}]}, "百九十四": {"id": "百九十四", "num": "百九十四", "text": ["古代街道は舗装されていたが、三百年の歳月がそれを半ば荒野に戻していた。しばらく進むと、道の脇に荷馬車が止まっていた。", "一行が街道を進み始めて間もなく、前方に篝火が見えた。商人の隊列か、とゴルムが言った。しかし篝火は動かない。", "「罠だ」とシラが囁いた。「この街道には盗賊団が出る」", "案の定、闇の中から人影が現れた。六人。武装している。先頭の男が「通行料だ」と言った。笑みを浮かべているが、目は笑っていない。"], "note": "", "end": "", "choices": [{"next": "二百三", "label": "金貨を払うなら金貨五枚を失い二百三へ進め。"}, {"next": "二百三", "label": "戦うなら盗賊三人（技術点六／体力点七）と戦え。勝利したなら経験値を一体につき一点（合計三点）獲得せよ。冒険者シートに記録し、レベルアップ条件を確認すること。その後二百三へ進め。体力点が零になったなら四百七十三へ進め。"}, {"next": "二百三", "label": "ゴルムが前に出る。運試しを行え。成功したなら盗賊たちは退散し二百三へ進め。失敗したなら戦闘へ。"}]}, "二百三": {"id": "二百三", "num": "二百三", "text": ["ザル＝カラムは、想像よりずっと巨大だった。", "荒野の真ん中に、黒い石造りの建造物が聳えている。かつては都市全体を覆う複合施設だったらしいが、今は半分以上が地下に沈んでいる。地上に残った部分だけでも、小さな城ほどの大きさがある。", "青白い光は地下から漏れていた。", "入口の前に、二人の冒険者の死体が転がっていた。最近死んだばかりだ。ゴルムが屈んで調べた。「外傷はない。魔法だ」と彼は言った。", "入口の両脇に石像が立っている。人の形をしているが、どこかが違う。目の部分が空洞で、その奥に微かな光がある。", "「正面から入れば起動する」とシラが言った。「別の入口があるかもしれない」"], "note": "これがゴーレムだ。", "end": "", "choices": [{"next": "六百一", "label": "正面から堂々と入るなら六百一へ進め。"}, {"next": "二百二十九", "label": "別の入口を探すなら運試しを行え。成功したなら二百二十九へ直接進め。失敗したなら二百十五へ進め。"}]}, "二百十五": {"id": "二百十五", "num": "二百十五", "text": ["石像が動いた。", "ゆっくりと、しかし確実に。目の光が強くなり、石の関節が軋む音がした。ゴルムが戦斧を構える。シラが短剣を抜く。"], "note": "番人ゴーレムと戦闘を行え。ゴーレム：技術点九／体力点十二。ゴーレムの皮膚は石でできている。技術点八以下の武器では一ラウンドに与えられるダメージは一点のみとなる。「ロットンのつるぎ」を持っている場合はこの制限を受けない。撃破時の経験値：二点。冒険者シートに記録し、レベルアップ条件を確認すること。", "end": "", "choices": [{"next": "二百二十九", "label": "勝利したなら二百二十九へ進め。"}, {"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}]}, "二百三十五": {"id": "二百三十五", "num": "二百三十五", "text": ["廊下の隅に、人が倒れていた。", "最近死んだばかりではない。かなり前だ。鎧は錆び、肉はとうに失われている。しかし首の骨に、何かが引っかかっていた。", "黒い首飾りだ。石のような素材でできており、髑髏を模した細工が施されている。美しいとは言えないが、何か強烈な力を帯びているのは一目で分かった。ゴルムが顔をしかめた。「触るな。呪いの品だ」", "しかし死体の傍に、古びた羊皮紙が落ちていた。かろうじて読める文字でこう書かれていた。", "「死神の首飾り。これを装備した者はあらゆる攻撃から身を守る力を得る。しかし代償として――」", "残りの文字は血で滲み、読めなかった。"], "note": "", "end": "", "choices": [{"next": "二百二十九", "label": "首飾りを装備するなら体力点を現在値の半分にせよ（端数切り捨て）。そのかわり以降の戦闘で受けるダメージが毎ラウンド一点軽減される。「死神の首飾りを装備」とメモ欄に記録し二百二十九へ戻れ。"}, {"next": "二百二十九", "label": "首飾りには触れず先へ進むなら二百二十九へ戻れ。"}]}, "二百六十八": {"id": "二百六十八", "num": "二百六十八", "text": ["三番目の石板を押すと、壁が音もなくずれた。", "隠し通路だ。幅は一人が通れる程度。石の壁に手をつきながら進むと、通路は緩やかに下り坂になっていた。ランタンの光が揺れる。", "しばらく進むと、小さな部屋に出た。台座の上に剣が置かれている。さらに奥へ進む通路が続いている。", "ヴァズの言った通りだった。守護者を避けて地下二層に直接出られる。しかし通路の壁に、無数の爪痕があった。誰かがここを通った跡だ。ずっと昔に。"], "note": "「隠し通路を通過した」とメモ欄に記録せよ。守護者（二百九十七）との戦闘を回避できる。ただしヴァズの代償は後に訪れる。", "end": "", "choices": [{"next": "二百七十二", "label": "台座の剣を調べるなら二百七十二へ進め。"}, {"next": "二百七十八", "label": "剣には触れず直接地下二層へ向かうなら二百七十八へ進め。"}]}, "二百七十二": {"id": "二百七十二", "num": "二百七十二", "text": ["壁の一部が、わずかに色が違った。", "よく見ると継ぎ目がある。押すと、石がずれて小さな部屋が現れた。", "部屋の中央に、台座があった。その上に剣が置かれていた。長さは普通だが、刀身に古代文字が刻まれている。鞘もなく、しかし刃は三百年の時を経ても一切錆びていない。", "手に取ると、左手の紋章が反応した。温かい感触。この剣は、紋章を持つ者のために置かれていたのだ。", "台座の下に石板があり、こう刻まれていた。", "「ロットンのつるぎ。星脈術師ロットンが黄金時代に鍛えた最後の一振り。これを握る者の技術は、研ぎ澄まされた刃のごとく冴え渡る」"], "note": "", "end": "", "choices": [{"next": "二百七十八", "label": "剣を手に取るなら「ロットンのつるぎ」を入手し技術点の初期値と現在値に永久に二点を加えよ。所持品欄に記録してから二百七十八へ進め。"}, {"next": "二百七十八", "label": "剣を置いていくなら二百七十八へ進め。"}]}, "三百六十二": {"id": "三百六十二", "num": "三百六十二", "text": ["ニフルユーム王国の城門は高く、黒い石で造られていた。", "かつては断片の時代でも最も栄えた王国だったという。しかし今、城壁には亀裂が走り、兵士たちの目に疲弊の色が滲んでいた。ザル＝カラムの影響がここまで届いているのだ。", "謁見を申し込むと、意外にも翌朝すぐに通された。玉座の間に座っていたのは、思いのほか若い王だった。三十代前半。しかし目には老人のような疲労が刻まれていた。", "「ヴォルカネスの復活の話は聞いている」と王は言った。「ニフルユームの占星術師が三ヶ月前から警告していた。だが民は信じなかった」", "王は立ち上がり、窓の外を見た。城下には普通の民の営みが続いている。何も知らない人々だ。", "「軍を出すことはできる。しかし条件がある」"], "note": "", "end": "", "choices": [{"next": "三百六十八", "label": "三百六十八へ進め。"}]}, "三百七十一": {"id": "三百七十一", "num": "三百七十一", "text": ["タンガリー山岳の麓から、トール＝グルムへの道は急峻だった。", "岩を削って作られた階段が山腹をぐるりと螺旋状に登っている。ゴルムは迷いなく先を行く。この道を何度も歩いたことがあるのだろう。", "「ドゥルスティーバーグとホイテンバーグの姉妹都市が合流してできた要塞だ」とゴルムは歩きながら言った。「二つの氏族が長い戦争の末に手を結んだ。それがトール＝グルムだ」", "城門に着くと、衛兵がゴルムの顔を見て表情を変えた。「ゴルム将軍……まだ生きておられたか」", "ゴルムは苦笑した。「儂はしぶといんだ」"], "note": "", "end": "", "choices": [{"next": "三百七十五", "label": "三百七十五へ進め。"}]}, "二百二十九": {"id": "二百二十九", "num": "二百二十九", "text": ["地下一層は、かつて研究室として使われていた場所だった。", "石の廊下に、壊れた実験器具や古い書物の残骸が散乱している。壁には星脈術の図式が刻まれている。ゴルムがランタンを高く掲げた。", "廊下の途中に、先の冒険者と思われる遺体が倒れていた。首に何か光るものが見えた。"], "note": "", "end": "", "choices": [{"next": "二百三十五", "label": "遺体に近づいて調べるなら二百三十五へ進め。"}, {"next": "六百六", "label": "「地下一層に古い日誌がある」とメモにあるなら実験室の机を探し六百六へ進め。"}, {"next": "二百四十一", "label": "扉を開けるなら二百四十一へ進め。"}, {"next": "二百七十八", "label": "扉を無視して先へ進むなら二百七十八へ進め。"}]}, "二百四十一": {"id": "二百四十一", "num": "二百四十一", "text": ["扉が開いた瞬間、冷たい空気が吹き出した。", "部屋の中央に、黒い靄が浮いていた。人の形をしているが、輪郭がぼやけている。目だけが、赤く光っていた。", "「久しぶりだ」と靄が言った。声は穏やかだった。「三百年ぶりに扉が開いた。あなたが来ることは知っていた」", "ゴルムが戦斧を構えた。シラは動かなかった。", "「戦う必要はない」と靄は続けた。「私はヴァズ。かつて黄金時代の賢者だった。今は――このような形になってしまったが」", "靄は天井の方を見た。「ヴォルカネスが目覚めかけている。あなたの左手の紋章は、最深部の扉を開ける鍵だ。私はあなたに取引を持ちかけたい。私を解放すれば、最深部への安全な道を教えよう」"], "note": "ヴァズは悪魔ではない。かつての賢者が封印された存在だ。しかし三百年の孤独が、彼を何に変えたかは分からない。", "end": "", "choices": [{"next": "六百七", "label": "ヴァズの話をもっと聞くなら六百七へ進め。"}, {"next": "二百五十六", "label": "取引に応じるなら「ヴァズと取引した」とメモ欄に記録し二百五十六へ進め。"}, {"next": "二百六十三", "label": "断るなら二百六十三へ進め。"}]}, "二百五十六": {"id": "二百五十六", "num": "二百五十六", "text": ["「賢明だ」とヴァズは言った。", "靄が動き、あなたの左手の紋章に触れた。冷たい感触があった。そして、何かが変わった感覚。紋章がわずかに輝き、すぐ消えた。", "「地下二層への近道を教えよう」とヴァズは言った。「廊下を戻り、三番目の石板を押せ。隠し通路がある。守護者を避けられる」", "そしてヴァズは懐から何かを取り出した。親指ほどの大きさの、深い金色に輝く石だ。「それと――これを持っていけ。賢者の石だ。かつて黄金時代の賢者たちが作り上げた、唯一無二の秘石。生命力を絶えず再生し続ける。サイコロを振るたびに、あなたの傷は少しずつ癒える」", "ゴルムがあなたの腕を掴んだ。「待て」と彼は低く言った。「ただでそんなものを渡すはずがない。代償は何だ」", "ヴァズは静かに答えた。「すでに取った。あなたの左手に触れた時に」", "あなたは左手を見た。紋章は変わっていない。しかし――何かが、確かに薄くなっていた。", "「技術の一部だ」とヴァズは言った。「永遠に戻らない。しかし賢者の石がある限り、あなたは死なない。どちらが得かは、自分で判断しろ」", "ゴルムは何も言わなかった。ただ、深く息をついた。"], "note": "「賢者の石」を入手した。所持品欄に記録せよ。技術点の初期値を永久に２点減らせ（現在値・上限値ともに）。冒険者シートに反映すること。／賢者の石の効果：所持している限り、サイコロを振るたびに体力点を１点回復する（初期値を超えることはできない）。これはこのゲームブック中で最強のアイテムである。「ヴァズと取引した」「隠し通路を知っている」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "二百六十八", "label": "隠し通路を使うなら二百六十八へ進め。"}, {"next": "二百九十七", "label": "通常の道を行くなら二百九十七へ進め。"}]}, "二百六十三": {"id": "二百六十三", "num": "二百六十三", "text": ["「断る」とあなたは言った。", "靄は沈黙した。長い沈黙だった。", "「そうか」とヴァズは最後に言った。「では、自力で行くがいい。ただし一つだけ言っておく。最深部で選択を迫られた時――力を継ぐことを恐れるな。恐れた者から、この世界は奪っていく」", "扉が静かに閉じた。", "ゴルムが息をついた。「正しい判断だ」"], "note": "", "end": "", "choices": [{"next": "二百七十八", "label": "二百七十八へ進め。"}]}, "二百七十八": {"id": "二百七十八", "num": "二百七十八", "text": ["地下二層は、一層とは空気が違った。", "石の廊下に、かすかな光が満ちている。壁に埋め込まれた宝石が発光しているのだ。星脈術の名残だとシラが言った。「黄金時代には、ヴァルデア中がこんな光に満ちていた」と彼女は静かに言った。どこか悲しげな声だった。", "廊下の先に、二つの扉があった。左は重厚な石の扉。右は金属製の扉で、奇妙な文様が刻まれている。", "「左が祭壇だ」とシラが言った。「右は守護者の間だ」", "ゴルムが地図を見た。「どちらも最深部への道につながっている。ただし守護者の間を通った方が、祭壇の力を使える状態で進める」"], "note": "", "end": "", "choices": [{"next": "二百八十四", "label": "左の祭壇へ向かうなら二百八十四へ進め。"}, {"next": "二百八十四", "label": "右の守護者の間へ向かうなら二百八十四へ進め。"}]}, "二百八十四": {"id": "二百八十四", "num": "二百八十四", "text": ["神殿区画の入口に、何かが立っていた。", "人の形をしているが、足が地面から浮いている。全身が青白い光に包まれ、輪郭が揺らいでいる。顔はかつて人間だったことを示しているが、その目には何の感情もない。ただ、あなたを見ていた。", "「星脈の番人エイサーだ」とシラが青ざめた顔で言った。「黄金時代の術師だった。死してなお、この場所を守り続けている。私でも手が出せない」", "ゴルムが戦斧を構えた。「生きた相手と同じように戦えばいい。死んでいるからといって、倒せないわけではない」", "エイサーが手を上げた。青白い光が凝縮される。", "エイサーが音もなく崩れた。光の粒が四散し、石の床に吸い込まれていく。最後の瞬間、その口が動いた。言葉にはならなかったが、あなたには何となく分かった。", "――ありがとう、と言ったのだ。", "ゴルムが呟いた。「やっと眠れるんだろう。三百年は長すぎる」"], "note": "【中ボス戦】神殿の番人「エイサー」との戦闘を行え。エイサー：技術点十一／体力点十八。エイサーは三ラウンドに一度、体力吸収を行う。吸収を受けた場合、あなたの体力点を二点失い、エイサーの体力点が二点回復する。「賢者の石」を持っている場合、吸収の効果を一点に軽減できる。猿の右手をまだ使っていない場合、このタイミングで使用できる。使うなら四百二十八へ進め。", "end": "", "choices": [{"next": "二百八十九", "label": "祭壇へ向かうなら二百八十九へ進め。"}, {"next": "二百九十七", "label": "守護者の間へ向かうなら二百九十七へ進め。"}, {"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}]}, "二百八十九": {"id": "二百八十九", "num": "二百八十九", "text": ["祭壇の間は広く、天井が高かった。", "中央に石の台座があり、その上に水晶の球体が置かれていた。球体の内部で、青白い光が渦巻いている。ザル＝カラムの外から見えていた光の源はこれだったのだ。", "シラが息を飲んだ。「星脈の核だ。まだ生きている」", "あなたは台座に近づいた。左手の紋章が、これまでにない強さで熱を帯びた。球体に触れると、膨大な何かが流れ込んでくる感覚があった。記憶のような、知識のような。", "突然、部屋の奥で音がした。石が砕ける音だ。守護者が目覚めた。"], "note": "「星脈の祭壇に触れた」とメモ欄に記録せよ。これはGOOD END 1の条件の一つだ。", "end": "", "choices": [{"next": "二百九十七", "label": "二百九十七へ進め。"}]}, "二百九十七": {"id": "二百九十七", "num": "二百九十七", "text": ["古代の守護者は、人の形をしていなかった。", "四本腕の石像が、信じられない速さで動いていた。ゴルムが「退け！」と叫ぶ。シラが左に飛ぶ。あなたは剣を抜いた。"], "note": "古代の守護者と戦闘を行え。守護者：技術点十／体力点十四。守護者は一ラウンドに二回攻撃を行う。二回目の攻撃では技術点から二点を引いた値で判定せよ。「ロットンのつるぎ」を持っている場合、一ラウンドに与えるダメージは三点となる。", "end": "", "choices": [{"next": "三百十二", "label": "勝利したなら三百十二へ進め。"}, {"next": "四百二十八", "label": "体力点が四点以下になったなら、猿の右手を使う選択肢がある。使うなら四百二十八へ進め。使わないなら戦闘を続けよ。"}, {"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}]}, "三百十二": {"id": "三百十二", "num": "三百十二", "text": ["守護者は崩れ、石の破片になった。", "しばらく誰も動かなかった。ゴルムが肩の傷を押さえている。シラの装束に血が滲んでいる。あなた自身も、いくつかの傷を負っていた。", "廊下の奥に、下への階段が見えた。そこから青白い光が激しく漏れている。地下三層だ。", "「ここから先は」とシラが言った。「私たちはついていけないかもしれない」", "ゴルムが頷いた。「あの紋章がなければ、星の間の扉は開かない。儂たちでは意味がない」", "二人があなたを見た。言葉はいらなかった。これはあなた一人の冒険だ。最初から、そういうことだったのだ。"], "note": "現在の体力点・技術点・運勢点を確認せよ。回復薬や食料があれば今使うことができる。", "end": "", "choices": [{"next": "六百十三", "label": "「ゴルムに伝言を届けた」とメモにあるならゴルムとの別れを経由して六百十三へ進め。"}, {"next": "六百十四", "label": "「ナックを仲間にした」とメモにあるならナックとの別れを経由して六百十四へ進め。"}, {"next": "九百一", "label": "覚悟を決めて階段を下りるなら九百一へ進め。"}]}, "三百二十四": {"id": "三百二十四", "num": "三百二十四", "text": ["星の間は、名前の通りだった。", "広大な空間の天井に、無数の光点が散りばめられている。星図だ。ヴァルデアの空を、そのまま石の天井に刻み込んだものだ。三百年前、ここで何かが行われた。そしてその何かが、今また繰り返されようとしている。", "部屋の中央に、巨大な石の祭壇があった。その上に、人が立っていた。", "いや、人ではない。かつて人だったものだ。", "ヴォルカネスだった。", "まだ完全には復活していない。半透明の身体が、青白い光の中で揺らめいている。しかし目はあなたをはっきりと見ていた。その目は深い穴のようで、覗き込むと吸い込まれそうだった。", "「鍵の持ち主が来た」とヴォルカネスは言った。声は耳の中に直接響いた。「遅かった。もう止められない」", "あなたは剣を構えた。左手の紋章が激しく輝いている。"], "note": "", "end": "", "choices": [{"next": "三百三十三", "label": "儀式を止めるために戦うなら三百三十三へ進め。"}, {"next": "九百三", "label": "「オルト＝ヴァルの記憶を受け入れた」とメモにあるなら名を呼んで対話を試みるなら九百三へ進め。"}, {"next": "三百四十一", "label": "儀式を利用することを考えるなら三百四十一へ進め。"}]}, "三百三十三": {"id": "三百三十三", "num": "三百三十三", "text": ["あなたは剣を構えたまま、祭壇へ向かって走った。", "ヴォルカネスが手を上げた。見えない力があなたを押し戻す。足が重い。空気が固まっているようだ。しかし紋章が輝き、その力を少し和らげた。", "「無駄だ」とヴォルカネスは言った。「三百年かけて準備したものを、お前ごときが止められると思うか」", "あなたは歯を食いしばった。"], "note": "ここで猿の右手を使うことができる。使うなら四百二十八へ進め。使わない場合は、そのまま戦闘へ進め。", "end": "", "choices": [{"next": "四百十五", "label": "四百十五へ進め。"}]}, "三百四十一": {"id": "三百四十一", "num": "三百四十一", "text": ["あなたは剣を下げた。", "ヴォルカネスの目が細くなった。「ほう」", "「儀式を利用させてもらう」とあなたは言った。「あなたの力が必要だ」", "「交渉か」ヴォルカネスは笑った。人間の笑い方ではなかった。「面白い。続けろ」"], "note": "これはBAD END 1へつながるルートだ。本当にこの道を選ぶか。", "end": "", "choices": [{"next": "四百五十五", "label": "このまま交渉を続けるなら四百五十五へ進め。"}, {"next": "三百三十三", "label": "やはり戦うなら三百三十三へ戻れ。"}]}, "三百五十六": {"id": "三百五十六", "num": "三百五十六", "text": ["ザル＝カラムから生きて戻ったあなたは、ミヤトの街道を北へ急いだ。", "タンガリー山岳が遠くに見える。その麓にトール＝グルムがある。東にはニフルユーム王国の旗が翻る城壁が見えた。テニスタ・テニストの森を抜ければエルフの隠れ里への道もある。", "ゴルムが立ち止まった。「満月まであと三日だ。一か所しか行けない」", "シラが空を見上げた。「急げ」", "どこへ向かうか。それだけが問題だった。"], "note": "", "end": "", "choices": [{"next": "三百六十二", "label": "ニフルユーム王国の城門へ向かうなら三百六十二へ進め。"}, {"next": "三百七十一", "label": "タンガリー山岳のトール＝グルムへ向かうなら三百七十一へ進め。"}, {"next": "三百八十三", "label": "テニスタ・テニストのエルフの長老に会いに行くなら三百八十三へ進め。"}, {"next": "三百九十一", "label": "一人で戻ると決めるなら三百九十一へ進め。"}]}, "三百六十八": {"id": "三百六十八", "num": "三百六十八", "text": ["「ザル＝カラムで発見された星脈術の知識は、すべてニフルユーム王国に引き渡すこと」と王は言った。「それがわれらの条件だ」", "ゴルムが拳を握った。「それは遺産だ。一国のものではない。ヴァルデア全土のものだ」", "王は静かに答えた。「分かっている。しかし民を守るためには力が必要だ。知識は力だ」", "シラは黙っていた。その目には、何か複雑な感情が混じっていた。黄金時代の知識がまた一国の手に渡る。それは過去の悲劇の繰り返しかもしれない。", "部屋の隅で、老いた占星術師がじっとあなたの左手を見ていた。"], "note": "軍の支援を受ける場合、最終決戦で技術点に一点のボーナスを得る。「ニフルユーム王国と契約した」とメモ欄に記録せよ。これは後のエンディングに影響する。", "end": "", "choices": [{"next": "四百二", "label": "条件を飲むなら「ニフルユーム王国と契約した」と記録し四百二へ進め。"}, {"next": "三百五十六", "label": "断って別の道を探すなら三百五十六へ戻れ。"}]}, "三百七十五": {"id": "三百七十五", "num": "三百七十五", "text": ["族長は年老いた女性ドワーフだった。名をヴァルナという。", "ゴルムとは旧知らしく、二人はタンガリー山岳の古い言語で短く言葉を交わした。それからヴァルナはあなたに向き直った。目が鋭い。値踏みするような視線だ。", "「ドゥルスティーバーグもホイテンバーグも、今は一つだ」と彼女は言った。「タンガリーの岩のように固く結ばれた。しかしその力を動かすには、それなりの理由が要る」", "ヴァルナは条件を出した。「ザル＝カラムの地下二層にある『星脈の核』を、われらに引き渡せ。それと引き換えに、われらが誇る最高の剣を贈ろう。もっとも」と彼女はあなたの腰を見た。「すでに持っているなら話は別だが」", "もし「ロットンのつるぎ」をすでに所持している場合、ヴァルナは条件を変える。「ならば星脈の核だけでよい。約束してくれ」と彼女は言った。"], "note": "「星脈の核を渡す約束をした」とメモ欄に記録せよ。「ロットンのつるぎ」を未所持の場合のみここで入手できる。これは後のエンディングに影響する。", "end": "", "choices": [{"next": "四百二", "label": "条件を飲むなら記録して四百二へ進め。"}, {"next": "三百五十六", "label": "断って別の道を探すなら三百五十六へ戻れ。"}]}, "三百八十三": {"id": "三百八十三", "num": "三百八十三", "text": ["シラに案内され、テニスタ・テニストの深部へと踏み込んだ。", "三百年前、シラはこの森を出た。黄金時代の終わりを見届けるために。そして今、初めて戻ってきた。木々の間を進みながら、彼女は一度だけ立ち止まり、深く息をついた。何も言わなかったが、その背中が多くを語っていた。", "長老の元へたどり着いた。", "長老は木の根が絡み合った玉座に座っていた。その目はシラよりさらに古く、何千年もの記憶を湛えているように見えた。", "「あなたが来ることは知っていた」と長老は言った。「黄金時代の終わりから、ずっと待っていた」", "長老は話し始めた。黄金時代の真実。ヴォルカネスを召喚したのが、実は人間の賢者だけではなかったこと。一部のエルフも関わっていたこと。シラがその事実を知っていたこと。", "シラは目を伏せていた。「ごめんなさい」と彼女は静かに言った。「言えなかった」", "長老が続けた。「しかしその罪を償う方法がある。星脈術の祭壇に触れた者だけが使える、古代の儀式がある」"], "note": "「黄金時代の真実を知った」とメモ欄に記録せよ。これはGOOD END 1の条件の一つだ。", "end": "", "choices": [{"next": "四百二", "label": "四百二へ進め。"}]}, "三百九十一": {"id": "三百九十一", "num": "三百九十一", "text": ["「一人で行く」とあなたは言った。", "ゴルムが止めようとした。シラも。しかしあなたの目を見て、二人は黙った。", "「死ぬかもしれないぞ」とゴルムは言った。", "「そうかもしれない」とあなたは答えた。「だがこれは最初からそういう話だった」", "ゴルムは何も言わなかった。代わりに、腰から小さな瓶を外してあなたに渡した。「最後の切り札だ。本当に駄目な時だけ使え」"], "note": "「強壮剤」を入手した。一度だけ使用でき、技術点を二点上げる効果がある（一つの戦闘の間のみ有効）。", "end": "", "choices": [{"next": "四百二", "label": "四百二へ進め。"}]}, "三百九十七": {"id": "三百九十七", "num": "三百九十七", "text": ["ミヤトの街道を南へ走った。", "荒野が変わっていた。草が枯れている。土が黒ずんでいる。空の色がおかしい。雲が渦を巻くように集まり、その中心がザル＝カラムの方角だった。", "道中で三人の冒険者の死体を見つけた。外傷はない。顔だけが、恐怖で固まっていた。", "ゴルムが低く言った。「ヴォルカネスの力が溢れ出している。近づくほど、弱い者から飲み込まれる」", "シラが空を見上げた。「テニスタ・テニストの森でさえ、この影響を感じていた。三百年前と同じだ」と彼女は静かに言った。「あの時も空がこんな色をしていた」", "あなたは立ち止まり、左手を見た。紋章が脈打っている。まるで心臓のように。", "ゴルムがあなたの肩を叩いた。「行けるか」", "「行く」とあなたは答えた。", "ゴルムは頷いた。「なら儂たちはここで待つ。お前が戻ってくるまで」", "シラがあなたに近づき、小さな木の実を渡した。「テニスタ・テニストの古木の実だ。食べれば体力点を四点回復できる。最後に取っておけ」"], "note": "「テニスタ・テニストの木の実」を入手した。いつでも使用でき体力点を四点回復する（初期値を超えることはできない）。所持品欄に記録せよ。", "end": "", "choices": [{"next": "四百二", "label": "ザル＝カラムへ向かうなら四百二へ進め。"}]}, "四百二": {"id": "四百二", "num": "四百二", "text": ["ザル＝カラムへ続く荒野に、生き物の気配が完全に消えていた。", "虫の声がない。風もない。砂すら動かない。遺跡が近づくほど、世界が死んでいく。空の渦は巨大な目のようにザル＝カラムの真上に収束し、青白い光が地平線を染めていた。", "入口に着いた。", "石像は粉々に砕けていた。番人ゴーレムの残骸だ。内側から破壊された。ヴォルカネスの力が溢れ、自らが作った番人すら弾き飛ばしたのだ。", "石の床を踏むたびに、左手の紋章が脈打つ。心臓の鼓動と同じリズムで。", "地下一層。廊下の壁に刻まれた星脈術の図式が、淡く光っていた。まるで最後の息をするように。", "地下二層。宝石が埋め込まれた廊下の光が、強くなっている。祭壇の水晶球は割れていた。その破片が床に散らばり、踏むたびに青白い光を放つ。", "地下三層への階段に辿り着いた。", "熱い。石の壁が熱を持っている。階段を下りるほど、空気が重くなる。息をするのが苦しい。それでも足は止まらなかった。", "紋章が激しく輝いた。まるで扉を開けろと命じるように。"], "note": "現在の能力値を確認せよ。食料・回復薬・テニスタ・テニストの木の実があれば今使うことができる。これが最終決戦だ。経験値の合計に関わらず、ここでLv.5「招かれざる者」へ自動昇格する。全能力点＋二を加え、以降の雑魚戦では覚醒判定を行うこと。", "end": "", "choices": [{"next": "四百十五", "label": "四百十五へ進め。"}]}, "四百十五": {"id": "四百十五", "num": "四百十五", "text": ["ヴォルカネスは完全に復活していた。", "もはや半透明ではない。祭壇の上に立つその姿は、高さが三メートルを超えていた。黒い鎧に全身を包んでいるが、その隙間から鱗が覗いている。人でも獣でもない。三百年の怨念と星脈の力が融合した、ヴァルデアに唯一の異形の存在だ。翼のような影が背後に広がり、声が空間そのものを歪めた。目だけが青白く光り、その光があなたを射抜いた瞬間、頭の中に直接声が響いた。", "「また来たか」とヴォルカネスは言った。「今度は止める気か」", "「そうだ」とあなたは言った。", "ヴォルカネスは笑った。星の間が揺れた。「では相手になろう。鍵の持ち主よ。お前の紋章がなければ、この戦いに意味はない」"], "note": "ヴォルカネスとの最終決戦を行え。ヴォルカネス：技術点十二／体力点二十。ヴォルカネスは三ラウンドに一度、「星脈の波動」を放つ。波動を受けた場合、運試しを行え。失敗したなら体力点を三点失う。成功したなら紋章が防いだものとして被害なし。猿の右手をまだ使っていない場合、このタイミングで使用することができる。使うなら四百二十八へ進め。", "end": "", "choices": [{"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}, {"next": "四百三十七", "label": "ヴォルカネスの体力点を零にした場合：「猿の右手未使用」かつ「シラと信頼関係あり」かつ「星脈の祭壇に触れた」ならば四百三十七へ進め。"}, {"next": "四百四十六", "label": "「仲間が生存」かつ「いずれかの国家と同盟を結んだ」ならば四百四十六へ進め。"}, {"next": "四百五十五", "label": "「ヴァズと取引した」かつ「儀式を利用した」ならば四百五十五へ進め。"}, {"next": "四百四十六", "label": "それ以外ならば四百四十六へ進め。"}]}, "四百二十八": {"id": "四百二十八", "num": "四百二十八", "text": ["あなたは左手を天に向けた。", "猿の右手を使う。一度だけ。これだけのために取っておいた、あるいは今この瞬間に賭けた、その一回を。", "サイコロを二個振れ。出た目の合計を確認し、以下の結果を適用せよ。"], "note": "猿の右手テーブルを参照し、効果と代償を適用した後、四百十五へ戻って戦闘を続けよ。ただし出目が十二「伝説の一手」の場合はヴォルカネスの体力点を半分にする。出目が二「悪魔の嘲笑」の場合はヴォルカネスが激怒し次のラウンドのダメージが二倍になる。猿の右手は使用済みとなった。冒険者シートに記録せよ。", "end": "", "choices": [{"next": "四百十五", "label": "四百十五へ戻って戦闘を続けよ。"}]}, "四百三十七": {"id": "四百三十七", "num": "四百三十七 GOOD END 1", "text": ["ヴォルカネスが崩れていった。", "青白い光が四散し、星の間が静寂に包まれた。祭壇の水晶球が、静かに割れた。", "あなたは膝をついた。体が限界だった。左手の紋章が、これまでとは違う輝き方をしていた。痛みではなく、温かさだった。", "足音がした。シラだった。いつの間にか、彼女は星の間に入っていた。", "「止められたのね」と彼女は言った。", "あなたは頷いた。", "シラは静かにあなたの左手を見た。「黄金時代の終わりに、一人の賢者がこう記した。鍵の持ち主がその力を手放さなかった時、星脈は新たな継承者を得る、と」", "紋章が強く輝いた。そして消えた。", "消えたのではない。身体の中に溶け込んだのだ。", "「あなたは流れ者ではなくなった」とシラは言った。「ヴァルデアはあなたの名を、永遠に記憶するだろう」", "断片の時代は終わった。どこかで、夜明けの光が荒野を染めていた。"], "note": "", "end": "――あなたの冒険は完結した。これは真のエンディングである。", "choices": [{"next": "四百三十七の二", "label": "後日譚を読むなら四百三十七の二へ進め。"}]}, "四百四十六": {"id": "四百四十六", "num": "四百四十六 GOOD END 2", "text": ["ヴォルカネスが崩れる音がした。", "あなたはその場に倒れた。意識が遠い。体のどこかが悲鳴を上げている。それでも、確かに勝った。", "「生きてるか」", "ゴルムの声だった。荒い息をしながら、老ドワーフが星の間に踏み込んできた。シラも続いた。", "「馬鹿野郎」とゴルムは言った。しかしその声は、怒りではなかった。", "左手の紋章が、静かに消えた。力が抜けていくような感覚。あなたはただの人間に戻った。", "それで良かった、と思った。", "「帰ろう」とゴルムが言った。シラが頷いた。", "名もなき流れ者は、初めて帰る場所を手に入れた。"], "note": "", "end": "「伝説とは、生き残った者だけが語れる話だ」――あなたの冒険は完結した。", "choices": [{"next": "四百四十六の二", "label": "後日譚を読むなら四百四十六の二へ進め。"}]}, "四百五十五": {"id": "四百五十五", "num": "四百五十五 BAD END 1", "text": ["取引は成立した。", "ヴォルカネスの力があなたの中に流れ込んできた瞬間、左手の紋章が黒く染まった。熱ではなく、冷たさだった。", "ヴォルカネスは消えた。しかし消えたわけではない。あなたの中に、溶け込んだのだ。", "ゴルムが階段の上から降りてきた。あなたの顔を見て、足が止まった。「……お前は」と彼は呟いた。", "シラは何も言わなかった。ただ目を伏せた。", "数週間後、断片の時代に新たな支配者が現れたと人々は語った。その者の左手には黒い冠の刻印があり、目は青白く光っていた。", "ヴァルデアに平和は訪れた。しかしそれは、恐怖による平和だった。"], "note": "", "end": "「あなたは英雄にはなれなかった。だが、歴史に刻まれる名を手に入れた」――あなたの冒険は、別の形で完結した。", "choices": []}, "四百六十四": {"id": "四百六十四", "num": "四百六十四 BAD END 2", "text": ["力が、止まらなかった。", "猿の右手が最悪の結果を引いた瞬間、あるいは封印を破った代償が返ってきた瞬間、左手の紋章が全身に広がり始めた。", "ヴォルカネスは確かに滅んだ。しかしその力を受け止める器として、あなた自身が砕けていった。", "痛みはなかった。それが最も恐ろしかった。", "意識が消えていく最後の瞬間に、あなたは荒野の入口で会った老婆の言葉を思い出した。「叶えたいことがあるなら、言葉を慎重に選べ」", "選んだ言葉は正しかったかもしれない。しかし猿の右手は最後まで気まぐれだった。", "暴走した星脈の力が、ヴァルデア中に嵐となって解き放たれた。世界は救われなかった。ただ、別の終わりを迎えただけだ。"], "note": "", "end": "「猿の右手は最後まで気まぐれだった。そして神は二度同じ奇跡を起こさなかった」――あなたの冒険はここで終わった。", "choices": []}, "四百七十三": {"id": "四百七十三", "num": "四百七十三 DEAD END", "text": ["あなたは倒れた。", "冷たい石の床に頬をつけたまま、意識が遠ざかっていった。最後に見えたのは、左手の紋章だった。それはまだ、かすかに輝いていた。", "まるで、あなたがいなくなった後も、どこかで輝き続けるかのように。"], "note": "", "end": "――あなたの冒険はここで終わった。もう一度最初から始めよ。", "choices": []}, "二": {"id": "二", "num": "二", "text": ["ドーランの街門は古く、木材が腐りかけていた。しかし衛兵は二人、しっかりと槍を構えていた。", "「止まれ」と一人が言った。「最近、妙な連中が多い。素性を聞かせてもらおう」", "あなたは旅人だと答えた。衛兵は疑わしそうな目であなたを頭から足まで見た。そしてあなたの左手の紋章に目が止まった。何か言いかけて、やめた。", "「……通っていい」と彼は言った。声が少し変わっていた。", "街に入ると、すぐ左手に掲示板があった。冒険者の依頼と思われる紙が数枚貼られている。その中の一枚が目に入った。「ザル＝カラム調査隊、参加者募集。報酬：金貨五十枚。ただし帰還者なし」。誰かが赤い文字で書き加えていた。「やめておけ」と。"], "note": "", "end": "", "choices": [{"next": "三", "label": "掲示板の依頼を詳しく読むなら三へ進め。"}, {"next": "四十七", "label": "そのまま街の中心へ向かうなら四十七へ進め。"}]}, "三": {"id": "三", "num": "三", "text": ["依頼書をよく読むと、依頼主はドーランの商人組合だった。日付は三週間前。しかしその下に別の紙が貼られていた。", "「警告。ザル＝カラムに向かった十七名の冒険者、全員消息不明。依頼は取り下げる。近づくな。―組合長」", "さらにその下に、小さな文字でこう書かれていた。手書きで、おそらく誰かが夜中に書き足したものだ。「地下に降りたら、壁を信じるな。足元を信じるな。自分の目だけを信じろ。そして紋章を持つ者よ、扉は内側からしか開かない。――R」", "Rとは誰か。あなたにはわからなかった。しかしその言葉は、心のどこかに刺さったまま残った。"], "note": "「壁を信じるな、足元を信じるな」とメモ欄に記録せよ。これは後に意味を持つ。", "end": "", "choices": [{"next": "四十七", "label": "街の中心へ向かうなら四十七へ進め。"}, {"next": "四", "label": "先に武器屋を探すなら四へ進め。"}]}, "四": {"id": "四", "num": "四", "text": ["武器屋は街門から二本目の路地にあった。「鉄の爪」という看板が出ている。中に入ると、老いたドワーフの職人が剣を磨いていた。", "品揃えはそれほど多くないが、質は確かだ。短剣が金貨三枚、剣が金貨八枚、盾が金貨五枚。あなたの財布には金貨三枚しかない。", "「珍しい紋章だな」と職人は言った。視線を上げずに、剣を磨き続けながら。「見たことがある。随分昔の話だが」", "「どこで」とあなたは聞いた。", "職人はしばらく黙っていた。「ザル＝カラムの生き残りの男が持っていた。五十年前の話だ。その男は右手に同じ紋章を持っていた。いや、左手だったか」彼は首を振った。「年は取りたくないものだ」"], "note": "「五十年前にも紋章を持つ者がいた」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "四十七", "label": "短剣を買うなら金貨三枚を払い「短剣」を所持品に記録して四十七へ進め。"}, {"next": "四十七", "label": "何も買わずに立ち去るなら四十七へ進め。"}, {"next": "五", "label": "職人にもっと話を聞くなら五へ進め。"}]}, "五": {"id": "五", "num": "五", "text": ["職人はしばらく剣を磨き続けた後、ため息をついた。", "「その男の名はゴルムといった」と彼は言った。「今もこの街にいるはずだ。錆びた剣亭に入り浸っている。あいつに聞け。儂よりずっとよく知っている」", "あなたはゴルムという名前を繰り返した。掲示板の警告を書いたRは、あるいは――。", "「一つだけ言っておく」と職人は剣を置いた。初めてあなたの目を見た。「ザル＝カラムに行くつもりなら、覚悟しておけ。あそこに入った者は、出てきても同じ人間ではなくなる。肉体ではなく、内側が変わる。それでも行くというなら、止めはしない」"], "note": "", "end": "", "choices": [{"next": "四十七", "label": "礼を言い、錆びた剣亭へ向かうなら四十七へ進め。"}]}, "六": {"id": "六", "num": "六", "text": ["宿と宿の間の狭い路地に、小さな人影があった。", "ゴブリンだ。年は若い。十代に見える。ボロボロの服を着て、壁に背をつけてしゃがんでいる。あなたに気づくと素早く立ち上がり、逃げ出そうとした。", "「待て」とあなたは言った。「何かしようってわけじゃない」", "ゴブリンは立ち止まった。警戒した目でこちらを見ている。金色の目だ。ゴブリンにしては珍しい色だった。", "「……金貨持ってるか？」とゴブリンは言った。声は若い。「腹が減ってる。三日、何も食べてない」"], "note": "", "end": "", "choices": [{"next": "七", "label": "金貨一枚を渡すなら七へ進め。"}, {"next": "四十七", "label": "断って立ち去るなら四十七へ進め。"}, {"next": "七", "label": "食料を渡せるなら食料一つを失い七へ進め。"}]}, "七": {"id": "七", "num": "七", "text": ["ゴブリンは金貨か食料を受け取ると、驚いたように目を見開いた。", "「……なんで」と彼は言った。「人間が俺にくれるなんて」", "「腹が減ってるなら当然だ」とあなたは言った。", "ゴブリンはしばらくあなたを見ていた。それからぼそりと言った。「ナック。俺の名前。お前は？」", "名前を教えると、ナックは少し笑った。笑うと思ったより幼い顔になった。「覚えといてやる。この街のこと、知りたいことがあったら言えよ。俺、物知りだから」彼は少し胸を張った。「……盗みはしないから安心しろ。ここ最近は」"], "note": "「ナックと知り合った」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "八", "label": "ナックにザル＝カラムのことを聞くなら八へ進め。"}, {"next": "四十七", "label": "錆びた剣亭へ向かうなら四十七へ進め。"}]}, "八": {"id": "八", "num": "八", "text": ["ナックはザル＝カラムの話を聞くと、少し表情が曇った。", "「行くのか、そこへ」と彼は言った。「やめとけよ。俺の仲間が何人か行ったことある。帰ってきたのは一人だけで、そいつは頭がおかしくなってた。何日も同じ言葉を繰り返してた。『扉の向こうに声がある。扉の向こうに声がある』って」", "ナックは壁を見た。「でも俺は……行ったことある。入口のとこまでだけど。なんか引き寄せられる感じがした。特に夜。青白い光が見えるだろ。あれ、呼んでるんだよ。何かが」", "「怖くなかったか」とあなたは聞いた。", "「めちゃくちゃ怖かった」とナックは即答した。「だから逃げ帰った。俺は馬鹿じゃないから」"], "note": "", "end": "", "choices": [{"next": "九", "label": "ナックを仲間に誘うなら九へ進め。"}, {"next": "四十七", "label": "礼を言い立ち去るなら四十七へ進め。"}]}, "九": {"id": "九", "num": "九", "text": ["「一緒に来ないか」とあなたは言った。「道案内をしてほしい」", "ナックはしばらく黙っていた。それから長いため息をついた。", "「……お前、頭おかしいだろ」と彼は言った。「俺は今めちゃくちゃ嫌だと思ってる。でも」ナックは金色の目であなたを見た。「お前、左手に変な紋章あるだろ。さっきから気になってたんだけど。それ、うちのじいちゃんが言ってた伝説の奴じゃないか？」", "「どんな伝説だ」", "「ゴブリンの古い話。いつか紋章を持つ人間が来て、世界を変える。それについていったゴブリンは英雄になる、って話」ナックは鼻をこすった。「信じてないけど。でも……行く。金貨十枚くれたら」"], "note": "「ナックを仲間にした」とメモ欄に記録せよ。金貨十枚を所持しているなら払い、所持品から減らせ。金貨が足りなければ十へ進め。", "end": "", "choices": [{"next": "四十七", "label": "金貨十枚を払えるなら払い四十七へ進め。"}, {"next": "十", "label": "金貨が足りないなら十へ進め。"}]}, "十": {"id": "十", "num": "十", "text": ["「金貨が足りない」とあなたは正直に言った。", "ナックはしばらく考えた。それから「まあいいや」と言った。「後払いでいい。帰ってきたら払え。もし帰れたら、の話だけど」", "彼は少し笑った。自嘲のような笑いだった。「どうせ俺、ここにいても未来ないし。ゴブリンが人間の街で生きていくのって、すごく大変なんだよ。食べるものもない、仕事もない、誰も相手にしてくれない。それだったら、英雄の伝説に賭けてみてもいいかもな」"], "note": "「ナックを仲間にした（後払い）」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "四十七", "label": "錆びた剣亭へ向かうなら四十七へ進め。"}]}, "十一": {"id": "十一", "num": "十一", "text": ["夜が更けると、ドーランの顔が変わった。", "昼間は普通の交易街だが、夜になると路地に人影が増える。賭博場の灯り。どこかから聞こえる争う声。そして――遠く、荒野の方角に、青白い光が低く輝いていた。", "あなたは宿の窓からその光を見た。左手の紋章が、微かに反応した。引き寄せられる感覚。しかし今はまだその時ではない。", "窓の下の路地で、二人の男が話していた。声を殺しているが、言葉の断片が聞こえた。「……奴はもう来た……紋章を持つ者が……計画を……」", "あなたは息を止めた。自分のことを話しているのか。しかし確認しようとした時、二人は素早く暗闇に消えた。"], "note": "「夜に怪しい会話を聞いた」とメモ欄に記録せよ。これは後に意味を持つ。", "end": "", "choices": [{"next": "二十六", "label": "そのまま眠るなら二十六へ進め。"}, {"next": "十一の二", "label": "路地へ降りて調べるなら十一の二へ進め。"}]}, "十一の二": {"id": "十一の二", "num": "十一の二", "text": ["路地に降りると、男たちの姿はすでになかった。しかし地面に何かが落ちていた。", "小さな金属製の円盤だ。片面に三日月と蛇が絡み合う紋様が刻まれている。見たことのない紋様だ。裏面には数字らしきものが刻まれているが、古い文字で読めない。", "ゴルムか神殿のオルドなら読めるかもしれない。"], "note": "「謎の金属円盤」を入手した。所持品欄に記録せよ。", "end": "", "choices": [{"next": "二十六", "label": "宿に戻って眠るなら二十六へ進め。"}]}, "十三": {"id": "十三", "num": "十三", "text": ["マグダが酒を注いでくれた後、ふと独り言のように言った。", "「あんた、右も左も分からないうちにここへ来た感じがするね」", "「そうかもしれない」とあなたは答えた。", "マグダは少し間を置いた。「ここ三ヶ月で、ザル＝カラムに向かった冒険者が何十人といる。誰一人戻らなかった。それでもまだ来る。なぜか分かるか？」", "「なぜだ」", "「夢を見るからさ」マグダは杯を拭く手を止めた。「この街の人間、みんな同じ夢を見てる。暗い扉の夢。誰かに名前を呼ばれる夢。あんたも見ただろ？」", "あなたは答えなかった。しかしマグダはあなたの顔を見て、小さく頷いた。「やっぱりな」"], "note": "", "end": "", "choices": [{"next": "十四", "label": "「なぜ分かった」と聞くなら十四へ進め。"}, {"next": "十二", "label": "別の話題に切り替えるなら十二へ戻れ。"}]}, "十四": {"id": "十四", "num": "十四", "text": ["「私も見たから」とマグダは静かに言った。「二十年前、この街に来た時から。毎晩同じ夢を見る。だからここを離れられない。夢の中の声が、ここにいろと言う」", "マグダは少し苦そうな顔をした。「ホビットはね、勘が強いんだ。で、私の勘が言ってる。あんたは普通の冒険者じゃない。あの遺跡が、あんたを引き寄せた。意図的に」", "「誰が」", "「それが分かれば苦労しない」マグダは再び布巾を動かした。「一つだけ言える。あの遺跡から出てきた男を一人だけ知ってる。三ヶ月前。半死にで戻ってきた。今は神殿に保護されてる。もし話を聞きたいなら、神殿のオルド司祭に頼め」"], "note": "「神殿に生き残りがいる」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "六十一", "label": "神殿へ向かうなら六十一へ進め。"}, {"next": "八十三", "label": "三人組の話を聞くなら八十三へ進め。"}]}, "十五": {"id": "十五", "num": "十五", "text": ["ゴルムは酒を一口飲んでから、ゆっくりと話し始めた。", "「儂が最初にザル＝カラムへ行ったのは、五十年前だ」と彼は言った。「若かった。無謀だった。仲間が六人いた」", "彼は杯を見つめた。「帰ってきたのは儂一人だった」", "沈黙。", "「仲間たちは何に」とあなたは聞いた。", "「何かに殺されたんじゃない」ゴルムはゆっくり首を振った。「自ら進んで奥へ行った。引き寄せられるように。儂だけが……引き返した。今でも、それが正しかったのかどうか分からない」", "彼の目に何かが光った。「仲間の一人が儂に言ったんだ。『お前はまだここにいてはいけない人間だ』と。その言葉の意味が、今になってやっと分かった気がする」"], "note": "", "end": "", "choices": [{"next": "十六", "label": "「仲間の名前を教えてくれ」と頼むなら十六へ進め。"}, {"next": "百三十八", "label": "出発の準備をするなら百三十八へ進め。"}]}, "十六": {"id": "十六", "num": "十六", "text": ["ゴルムは長い間黙っていた。", "「六人いた」と彼はついに言った。「人間が三人、ドワーフが儂と兄の二人、そしてエルフが一人」", "あなたは息を止めた。", "「エルフの名はシラといった」ゴルムはあなたをまっすぐ見た。「今夜、この店に入ってきたエルフだ。儂が驚いたのはそのためだ。あれから五十年。シラはあの日と何も変わっていない。エルフとはそういうものだが……」", "ゴルムは声を落とした。「あの夜、儂の兄はシラの隣で消えた。シラは止めなかった。儂は今でもその理由を聞けていない」"], "note": "「ゴルムの兄がザル＝カラムで消えた」「シラはその場にいた」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "十七", "label": "シラに問い詰めるなら十七へ進め。"}, {"next": "百三十八", "label": "今は黙って出発するなら百三十八へ進め。"}]}, "十七": {"id": "十七", "num": "十七", "text": ["シラはあなたの問いを聞いて、静かに目を伏せた。", "「知っていた」と彼女は言った。「ゴルムの兄、ドゥルムが消えた時、私は止められた。いや、正確には――止めなかった」", "「なぜ」", "「あの時、私はまだヴォルカネスの計画の一部だった」シラの声は低く、均一だった。「黄金時代の終わりに、エルフの一部が悪魔の王との契約を結んだ。私もその一人だ。ドゥルムは……生贄として必要だった」", "ゴルムが立ち上がりかけた。あなたは片手で制した。", "「その契約は今も続いているのか」とあなたは聞いた。", "「それを断ち切るために、三百年待った」とシラは言った。「それが私の贖罪だ」"], "note": "「シラはヴォルカネスと契約していた過去を持つ」とメモ欄に記録せよ。これはGOOD END 1とエンディング分岐に影響する。", "end": "", "choices": [{"next": "百三十八", "label": "シラを信じて共に行くなら百三十八へ進め。"}, {"next": "三百九十一", "label": "シラを信用できず単独で行くなら三百九十一へ進め。"}]}, "十八": {"id": "十八", "num": "十八", "text": ["神殿の奥に、一人の男が横たわっていた。", "年は三十代。しかし顔は老人のように窶れている。目は開いているが、焦点が合っていない。オルドが「三ヶ月前に廃墟から這い出してきた」と言った男だ。", "「話せるか」とあなたは聞いた。", "男はゆっくりとあなたの方を向いた。そしてあなたの左手を見た瞬間、目に光が戻った。", "「来た」と男は掠れた声で言った。「星が言っていた。紋章の者が来ると」", "「何を見た。中で何があった」", "男は震える手でシーツを握った。「扉だ。扉が三つある。一つ目は過去。二つ目は現在。三つ目は……三つ目を開けてはいけない。三つ目だけは」彼は咳き込んだ。「お前が誰よりも欲しいと思うものが、その向こうにある。だから開けてはいけない」"], "note": "「三番目の扉を開けてはいけない」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "十九", "label": "もっと詳しく聞くなら十九へ進め。"}, {"next": "百七", "label": "オルドのもとへ戻るなら百七へ進め。"}]}, "十九": {"id": "十九", "num": "十九", "text": ["「三つ目の扉に何がある」とあなたは聞いた。", "男は長い間黙っていた。それから「記憶だ」と言った。", "「お前の記憶。忘れていた記憶。失くした記憶。本当のお前が誰なのかという記憶」彼は目を閉じた。「儂はそれを開けた。見てしまった。それで……こうなった」", "「なぜそれが危険なんだ」", "「見た者は、戻れないからだ」男の唇が微かに動いた。「お前が誰かを知った瞬間、お前はもうここにはいられない。星の間に引き込まれる。ヴォルカネスの一部になる」", "男は静かに目を閉じた。話し疲れたらしかった。呼吸は穏やかだった。しかしその顔には、何か深い平和があった。あるいは諦めか。"], "note": "", "end": "", "choices": [{"next": "百七", "label": "オルドのもとへ戻るなら百七へ進め。"}]}, "二十": {"id": "二十", "num": "二十", "text": ["謎の金属円盤をオルドに見せると、老司祭の顔色が変わった。", "「どこで手に入れた」と彼は低い声で聞いた。", "あなたが路地で拾ったと説明すると、オルドは深く息をついた。「これは……闇の商会の印だ。三日月と蛇。ヴォルカネス復活を望む人間の組織。断片の時代が終わることを恐れている者たち。今の秩序で利益を得ている者たちだ」", "裏面の文字を読んでもらうと、オルドの表情がさらに険しくなった。「数字ではない。日付だ。満月の日。つまり……三日後だ。何かが起きる。三日以内に」"], "note": "「闇の商会が動いている」「満月の三日後に何かが起きる」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "百三十八", "label": "今すぐ出発するなら百三十八へ進め。"}, {"next": "二十六", "label": "もう一晩準備をするなら二十六へ進め。"}]}, "五百一": {"id": "五百一", "num": "五百一", "text": ["荒野を一時間ほど進むと、廃村があった。", "かつては十軒ほどの家が並んでいたらしい。しかし今は半分が崩れ、残りも窓が割れ、扉が外れている。村の中央に井戸があった。水は枯れていた。", "ゴルムが地面を調べた。「足跡がある。最近だ。一人か二人」", "ナックが鼻をひくひくさせた。「人の匂いがする。生きてる人間。どこか近くに隠れてる」", "シラは何も言わなかった。しかしその目が、村の端の崩れかけた建物を向いていた。"], "note": "", "end": "", "choices": [{"next": "五百二", "label": "建物を調べるなら五百二へ進め。"}, {"next": "百五十二", "label": "このまま先へ進むなら百五十二か百八十八または百九十四のルートへ戻れ。"}]}, "五百二": {"id": "五百二", "num": "五百二", "text": ["建物の中に、女がいた。三十代。旅人の装束だが、傷だらけだ。右腕に包帯が巻かれている。あなたたちを見て身構えたが、武器を向けなかった。", "「生きていたか」とゴルムが言った。驚いた声だった。「お前は……ドーランの冒険者組合の」", "「知り合いか」とあなたは聞いた。", "「ロサだ」ゴルムは彼女に近づいた。「三週間前にザル＝カラムへ向かった隊の一人だ。生き残りがいたとは」", "ロサは壁に背をつけたまま言った。「帰れなかった。足を怪我して、ここで動けない。水も食べ物もなくなりかけてる」"], "note": "", "end": "", "choices": [{"next": "五百三", "label": "ロサを助けて回復薬か食料を渡すなら五百三へ進め。"}, {"next": "五百四", "label": "話だけ聞いて先へ進むなら五百四へ進め。"}]}, "五百三": {"id": "五百三", "num": "五百三", "text": ["食料か回復薬を渡すと、ロサは素直に受け取った。「ありがとう」と彼女は言った。「助かった」", "しばらく体を休めてから、ロサは話した。", "「中で何を見たか話す。信じるかどうかはあんたたちが決めていい」彼女は目を伏せた。「地下一層に降りたところで、仲間の一人が急に動かなくなった。立ったまま。目が虚ろで、何も聞こえていないみたいに。そして歩き始めた。奥へ。止めようとしたら振り払われた。力が普通じゃなかった。操られてるみたいに」", "「全員そうなったのか」", "「私以外は全員。私は最初に逃げ出した。臆病者だと思われてもいい」", "ロサは最後にこう言った。「一つだけ教える。中に古い日誌があった。研究者のものだ。ヴォルカネスが何者かが書いてある。地下一層の実験室の机の上に。まだあるかもしれない」"], "note": "「地下一層で操られた者がいた」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "百五十二", "label": "先へ進むなら百五十二か百八十八へ進め。"}]}, "五百四": {"id": "五百四", "num": "五百四", "text": ["物資を渡せなかったが、ロサは話してくれた。", "「地下一層に古い日誌がある。研究者のもので、ヴォルカネスについて書かれている。机の上に置いてあった。まだあるかもしれない」", "それだけ言うと彼女は目を閉じた。体力が限界なのだろう。あなたたちはそっとその場を離れた。"], "note": "「地下一層に古い日誌がある」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "百五十二", "label": "先へ進むなら百五十二か百八十八へ進め。"}]}, "五百五": {"id": "五百五", "num": "五百五", "text": ["古代街道を進むと、荷馬車が一台止まっていた。御者の老人が馬に水を飲ませている。", "「旅人かい」と老人は言った。「こんな時間にこの道を行くとは物好きな。ザル＝カラムへか？」", "老人は物売りだった。荷台にいくつかの品物がある。"], "note": "", "end": "", "choices": [{"next": "五百六", "label": "品物を見るなら五百六へ進め。"}, {"next": "五百七", "label": "立ち話だけして先へ進むなら五百七へ進め。"}]}, "五百六": {"id": "五百六", "num": "五百六", "text": ["荷台には以下の品物があった。", "「火打石」金貨一枚（暗所で松明の代わりになる）。「解毒薬」金貨二枚（毒を一度無効化できる）。「縄」金貨一枚（特定の場面で使える）。「干し肉」金貨一枚（固いパンと同じ効果）。", "老人は愛想がよかった。「ただで教えてやる。ザル＝カラムの地下には毒霧が出る場所がある。解毒薬があると助かるぞ。それから縄は必ず持っていけ。落とし穴がある」"], "note": "", "end": "", "choices": [{"next": "百五十二", "label": "品物を買って先へ進むなら購入したものを所持品に記録し百五十二か百九十四へ進め。"}, {"next": "百五十二", "label": "何も買わずに先へ進むなら百五十二か百九十四へ進め。"}]}, "五百七": {"id": "五百七", "num": "五百七", "text": ["「ここ一月で、この道を通った冒険者の数を数えたら二百人を超えた」と老人は言った。「全員ザル＝カラムへ向かった。帰ってきたのは……十人もいないかな」", "「それでも商売をしているのか」とあなたは聞いた。", "老人は笑った。「命懸けで行く奴には、命懸けで売れる。これが商売というものだ。ただし」彼は顔を曇らせた。「最近は様子がおかしい。帰ってきた連中が全員、同じ言葉を言う。『扉が呼んでいる』と。その目が……普通じゃない」"], "note": "", "end": "", "choices": [{"next": "百五十二", "label": "先へ進むなら百五十二か百九十四へ進め。"}]}, "五百八": {"id": "五百八", "num": "五百八", "text": ["族長のオーク、その名をラグタルといった。交渉に応じた後、彼はあなたをしばらく見ていた。", "「紋章を持つ者のことは、われらの間にも伝わっている」と彼は言った。「断片の時代が終わり、新しい時代が来る時、紋章を持つ者が現れる。われらオークはかつて古代帝国の兵士だった。星脈術師に仕えた。その記憶は血に刻まれている」", "ラグタルは腰から古びた石板を取り出した。「これを持っていけ。古代の言葉で何か書いてある。儂には読めないが、賢者なら読めるかもしれない。ずっと持っていても仕方がない」"], "note": "「古代の石板」を入手した。所持品欄に記録せよ。ヴァズか神殿のオルドが読める可能性がある。", "end": "", "choices": [{"next": "百八十八", "label": "先へ進むなら百八十八へ進め。"}]}, "五百九": {"id": "五百九", "num": "五百九", "text": ["森の中でシラが立ち止まった。木に手をついて、しばらく動かなかった。", "「三百年前もここを通った」と彼女は静かに言った。「この木は当時はなかった。でも土の匂いは同じだ」", "あなたは黙って待った。", "「ドゥルムは優しい人だった」とシラは続けた。「ゴルムとは正反対で、笑ってばかりいた。私が彼を死に追いやった。ゴルムがまだ儂を見る目が辛い。当然だ」", "「なぜ止めなかった」とあなたは聞いた。", "「当時の私には、命令があった。止めてはいけないという命令が。でも本当は」シラは手を離し、また歩き始めた。「怖かっただけだ。逆らうのが。それだけだ」"], "note": "", "end": "", "choices": [{"next": "百八十八", "label": "「もう十分だ」と言うなら百八十八へ進め。"}, {"next": "五百十", "label": "「いつかゴルムに話すべきだ」と言うなら五百十へ進め。"}]}, "五百十": {"id": "五百十", "num": "五百十", "text": ["シラはあなたの言葉を聞いて、少し間を置いた。", "「話した、あの夜に。錆びた剣亭で」と彼女は言った。「あなたが席を外した時。ゴルムは黙って聞いていた。何も言わなかった。ただ最後に一言だけ言った」", "「何と言った」", "「『儂はお前を恨んでいない』と」シラの声がわずかに揺れた。「ただそれだけ。でも……それだけで十分だった。三百年分の重さが少し軽くなった気がした」"], "note": "「シラとゴルムの間に和解の言葉があった」とメモ欄に記録せよ。これはGOOD END 2の条件に影響する。", "end": "", "choices": [{"next": "百八十八", "label": "先へ進むなら百八十八へ進め。"}]}, "五百十一": {"id": "五百十一", "num": "五百十一", "text": ["夜、野営をしている時、ナックが焚き火を見つめながら言った。", "「俺、実は字が読める」と彼は言った。「ゴブリンで字が読める奴は少ない。じいちゃんに教わった。じいちゃんは昔、古代帝国の図書館で働いてたって言ってた」", "「それが役に立つかもしれない」とあなたは言った。", "「古代の文字も少し分かる」ナックは焚き火の火を見ながら言った。「だから俺、本当は怖いんだよな。ザル＝カラムに行くのが。あそこに何があるか、じいちゃんの話から大体分かってる。でも言えなかった。言ったらお前に行くなって言われると思って」", "「何があると知っている」", "ナックは少し間を置いた。「ヴォルカネスの本当の名前。人間だった頃の名前。それを知ってる者は……最終決戦で、戦う以外の選択ができる」"], "note": "「ナックはヴォルカネスの本当の名前を知っている」とメモ欄に記録せよ。これは最終決戦の第三の選択肢に影響する。", "end": "", "choices": [{"next": "五百十二", "label": "「今教えてくれ」と言うなら五百十二へ進め。"}, {"next": "百八十八", "label": "「今は眠れ、後で聞く」と言うなら百八十八か百九十四へ進め。"}]}, "五百十二": {"id": "五百十二", "num": "五百十二", "text": ["ナックは焚き火の炎を一度見て、それからあなたの目を見た。", "「ヴォルカネスの人間の頃の名前は『オルト＝ヴァル』だ」と彼は言った。「黄金時代の最高位の賢者。星脈術の創始者の一人。善人だった。記録によれば」", "「なぜ悪魔の王になった」", "「実験のせいだ」ナックは静かに言った。「死を超える方法を研究していた。弟子が死んで、それを取り戻したかった。禁断の儀式を行い、自分の魂の半分を対価にした。魂の半分を失った人間は……変わっていく。少しずつ、少しずつ。百年かけて、別の存在になる」", "シラが静かに頷いた。「知っていた。だから止められなかった。誰も気づかなかった頃から、私は知っていた」"], "note": "「ヴォルカネスの真の名はオルト＝ヴァル」「善人だった賢者が魂の半分を失い変化した」とメモ欄に記録せよ。最終決戦での第三の選択肢が解放される。", "end": "", "choices": [{"next": "二百三", "label": "先へ進むなら二百三へ進め。"}]}, "六百一": {"id": "六百一", "num": "六百一", "text": ["入口を抜けると、広い前室があった。かつては検問所のような場所だったらしい。石の台が並び、その上に朽ちた木箱が重なっている。", "壁に文字が刻まれていた。古い文字だ。ナックが近づいて読んだ。", "「警告。この先に入る者は、自らの意志を持って入れ。迷いのある者は引き返せ。星脈は弱い意志を食う」", "ゴルムが低く言った。「五十年前も同じ文字があった。儂の仲間の一人が、これを読んで顔色が変わった。今思えば、あいつが最初に操られた」"], "note": "", "end": "", "choices": [{"next": "六百二", "label": "奥へ進むなら六百二へ進め。"}, {"next": "六百三", "label": "木箱を調べるなら六百三へ進め。"}]}, "六百二": {"id": "六百二", "num": "六百二", "text": ["廊下を進むと、別のパーティと出くわした。四人組。人間が三人とエルフが一人。全員が武装し、警戒した目であなたたちを見ていた。", "「先客がいたか」とリーダーらしき大柄な男が言った。「お互い、邪魔はしない約束だ。別のルートを行こう」", "シラが小声で言った。「あのエルフ、目がおかしい。瞳孔が開いている。もう操られているかもしれない」", "ゴルムが頷いた。「気をつけろ。敵になるかもしれない」"], "note": "", "end": "", "choices": [{"next": "六百四", "label": "警告して立ち去るなら六百四へ進め。"}, {"next": "二百十五", "label": "黙って別のルートへ向かうなら二百十五へ進め。"}, {"next": "六百五", "label": "協力を申し出るなら六百五へ進め。"}]}, "六百三": {"id": "六百三", "num": "六百三", "text": ["木箱の中に、かなり古い装備品が詰まっていた。ほとんどは腐っているか錆びているが、一つだけ状態のいいものがあった。", "小さな丸い鏡だ。金属製で、裏面に星脈の紋様が刻まれている。あなたが手に取ると、鏡面に何かが映った。通常の反射とは別の像。一瞬だったが、それは扉だった。三つの扉。", "「星脈の鏡だ」とシラが驚いた声で言った。「黄金時代の道具。特定の場所では、見えないものを映す。持っていけ」"], "note": "「星脈の鏡」を入手した。所持品欄に記録せよ。地下深部で隠されたものを見ることができる。", "end": "", "choices": [{"next": "六百二", "label": "奥へ進むなら六百二へ進め。"}]}, "六百四": {"id": "六百四", "num": "六百四", "text": ["「あなたのパーティのエルフ、目がおかしい。早く外へ連れ出した方がいい」とあなたは言った。", "リーダーは一瞬驚いた顔をしたが、すぐに険しくなった。「余計なお世話だ。行くぞ」と仲間に言い、立ち去った。", "ゴルムが首を振った。「聞く耳を持たないか。まあ仕方がない」", "シラが静かに言った。「後で会うかもしれない。その時は……敵として」"], "note": "「別のパーティを警告したが無視された」とメモ欄に記録せよ。", "end": "", "choices": [{"next": "二百十五", "label": "前へ進むなら二百十五へ進め。"}]}, "六百五": {"id": "六百五", "num": "六百五", "text": ["協力の申し出に、リーダーは少し考えてから頷いた。「悪くない。一緒に行こう」", "しかし数分後、操られたエルフが突然動き出した。別方向へ走り出す。仲間が追おうとした瞬間、石の天井から罠が落ちてきた。", "混乱の中であなたは咄嗟にゴルムの腕を引いた。罠は免れた。しかし別パーティのリーダーが腕に傷を負った。操られたエルフは消えた。", "リーダーは傷を押さえながら言った。「助かった。借りができた。深部で会うことがあれば、恩を返す」"], "note": "「別パーティのリーダーに恩を売った」とメモ欄に記録せよ。深部で助けを得られる可能性がある。", "end": "", "choices": [{"next": "二百十五", "label": "前へ進むなら二百十五へ進め。"}]}, "六百六": {"id": "六百六", "num": "六百六", "text": ["「地下一層に日誌がある」とロサから聞いていたなら、実験室の机を探せ。", "果たして、埃に塗れた日誌があった。かなり古い。ページをめくると、文字は読めたが、内容が衝撃的だった。", "日誌の著者はオルト＝ヴァル。ヴォルカネスの人間時代の名前だ。", "最後のページにこう書かれていた。「実験は失敗した。弟子は戻らなかった。私は魂の半分を失った。しかし不思議なことに、後悔はない。この選択は間違いではなかった。ただ方法が間違っていた。誰かが正しい方法で完成させてくれるなら、この苦しみにも意味がある。紋章を持つ者よ、扉の前で私の名を呼べ。私は応える」"], "note": "「ヴォルカネスは呼べば応える」とメモ欄に記録せよ。最終決戦での第三の選択肢が強化される。", "end": "", "choices": [{"next": "二百四十一", "label": "先へ進むなら二百四十一か二百七十八へ進め。"}]}, "六百七": {"id": "六百七", "num": "六百七", "text": ["ヴァズとの対話を深めると、彼は思いがけないことを話した。", "「私はオルト＝ヴァルの弟子だった」とヴァズは言った。「師が禁断の儀式を行う前夜、私は止めようとした。しかし間に合わなかった。師の魂の半分が失われる瞬間、私はその場にいた。その衝撃が私をこの状態にした」", "「なぜ封印された」", "「ゴルムの仲間に封印された。五十年前、彼らはここに来た。私が師の痕跡を守ろうとしたのを、敵意と勘違いした。ゴルムの兄ドゥルムが封印した。その後ドゥルムは奥へ消えた……」", "ヴァズは静かに言った。「ゴルムに伝えてくれ。兄は苦しまなかった。星脈に溶け込んだだけだ。今でもここにいる。この遺跡の一部として」"], "note": "「ドゥルムは星脈に溶け込んでいる」「苦しまなかった」とメモ欄に記録せよ。ゴルムとの会話フラグ。", "end": "", "choices": [{"next": "二百五十六", "label": "ヴァズとの取引を受けるなら二百五十六へ進め。"}, {"next": "二百六十三", "label": "断るなら二百六十三へ進め。"}]}, "六百八": {"id": "六百八", "num": "六百八", "text": ["地下一層から二層へ向かう途中、ゴルムに話した。", "「ヴァズが言っていた。ドゥルムは苦しまなかった。星脈に溶け込んだだけだと」", "ゴルムは立ち止まった。長い沈黙。それから彼は壁に手をついた。肩が震えていた。", "しばらくして彼は顔を上げた。目が赤かったが、声は静かだった。「そうか。……そうか」", "もう何も言わなかった。しかしその後、ゴルムの歩みが少し軽くなった気がした。"], "note": "「ゴルムに伝言を届けた」とメモ欄に記録せよ。GOOD END 2の条件が強化される。", "end": "", "choices": [{"next": "二百七十八", "label": "先へ進むなら二百七十八へ進め。"}]}, "六百九": {"id": "六百九", "num": "六百九", "text": ["廊下の途中で、床から薄い霧が漏れてきた。", "ナックが素早く壁際に退いた。「毒だ。匂いで分かる」", "前に進むには霧の中を通るしかない。しかし解毒薬を持っていれば先に飲めばいい。縄があれば天井の梁に引っかけて迂回できる。"], "note": "", "end": "", "choices": [{"next": "二百七十八", "label": "「解毒薬」を所持しているなら飲んで通り抜け、先へ進め。解毒薬を失い二百七十八へ進め。"}, {"next": "二百七十八", "label": "「縄」を所持しているなら天井伝いに迂回し二百七十八へ進め。縄を失う。"}, {"next": "二百七十八", "label": "何も持っていないなら運試しを行え。成功したなら息を止めて駆け抜け二百七十八へ進め。失敗したなら体力点を四点失い二百七十八へ進め。"}]}, "六百十": {"id": "六百十", "num": "六百十", "text": ["「星脈の鏡」を持っているなら、地下二層の祭壇の間でそれを使うことができる。", "鏡を水晶球に向けると、鏡面に像が映った。", "それは過去の映像だった。三百年前。この部屋に人影が集まっている。賢者たちだ。その中心に、一人の男がいた。白い衣を纏い、穏やかな顔をしている。彼が何かを語りかけている。言葉は聞こえないが、その表情は悲しみと決意に満ちていた。", "男はゆっくりと振り返り、鏡の中のあなたを見た。まるで三百年の時を超えて。", "その口が動いた。「頼む」と。", "映像は消えた。鏡は真っ暗になった。"], "note": "「ヴォルカネスの人間時代の姿を見た」「頼むという言葉を聞いた」とメモ欄に記録せよ。最終決戦の第三選択肢が完全に解放される。", "end": "", "choices": [{"next": "二百八十四", "label": "先へ進むなら二百八十四か二百九十七へ進め。"}]}, "六百十一": {"id": "六百十一", "num": "六百十一", "text": ["廊下を進んでいると、床が突然崩れた。", "「縄」を持っているなら即座に使い、壁に引っかけて落下を防げる。", "「縄」がない場合、運試しを行え。成功したなら咄嗟に壁を掴んで体力点を二点失うだけで助かる。失敗したなら体力点を六点失う。", "落とし穴の底には、以前の冒険者の遺体があった。所持品の中に「回復薬」が一つ残っていた。"], "note": "", "end": "", "choices": [{"next": "二百七十八", "label": "回復薬を入手して先へ進むなら二百七十八か二百八十九へ進め。"}, {"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}]}, "六百十二": {"id": "六百十二", "num": "六百十二", "text": ["守護者エイサーを倒した後、光の粒が消える前に、シラが何かを呟いた。", "「エイサー。私の師だった」と彼女は言った。", "全員が驚いた。", "「黄金時代に星脈術を教えてくれた最初の師。あの夜、師は戦いの中で倒れた。私は師を守れなかった。三百年、この場所で番人として……それが師の選択だったのか」", "シラはゆっくりと光の粒に手を伸ばした。「ありがとうございました」と彼女は言った。", "光の粒が集まり、一瞬だけ人の形を作った。それはシラに向かって微かに頷いたように見えた。そして消えた。"], "note": "「シラがエイサーに別れを告げた」とメモ欄に記録せよ。シラの贖罪カウンターが進む。GOOD END 1に影響。", "end": "", "choices": [{"next": "三百十二", "label": "先へ進むなら三百十二へ進め。"}]}, "六百十三": {"id": "六百十三", "num": "六百十三", "text": ["階段の前でゴルムがあなたの肩を掴んだ。", "「一つだけ言っておく」と彼は言った。「儂は五十年前、引き返した。今回も引き返す。情けないとは思わない。あれは儂の限界だった。でも」", "ゴルムはあなたの目をまっすぐ見た。「お前は引き返すな。お前が引き返したら、儂の兄の死に意味がなくなる。お前だけが進める。だから進め」", "彼は手を離した。「帰ってこい。必ずだ」"], "note": "", "end": "", "choices": [{"next": "三百二十四", "label": "「必ず帰る」と言って進むなら三百二十四へ進め。"}]}, "六百十四": {"id": "六百十四", "num": "六百十四", "text": ["階段の前でナックが駆け寄ってきた。", "「俺も行く」と彼は言った。", "「紋章がなければ扉は開かない」とあなたは言った。", "「分かってる」ナックは金色の目であなたを見た。「でも言いたいことがある。お前に会えてよかった。本当に。ゴブリンで、人間に金貨くれた奴なんて初めてだった。英雄の伝説が本当かどうかは知らない。でも俺、お前についてきてよかったと思ってる」", "彼は少し照れたように鼻をこすった。「ちゃんと帰ってこいよ。後払いの金貨、まだもらってないから」"], "note": "「ナックが仲間として認めた」とメモ欄に記録せよ。GOOD END 2の条件が強化される。", "end": "", "choices": [{"next": "三百二十四", "label": "「必ず帰る」と言って進むなら三百二十四へ進め。"}]}, "八百一": {"id": "八百一", "num": "八百一", "text": ["ドーランに戻ると、街の空気が変わっていた。", "人々の顔に恐怖がある。空の色が微かに歪んでいる。ザル＝カラムの方角から、昼でも青白い光が漏れていた。", "マグダが駆け寄ってきた。「生きてたか。三日、どこにいた」三日経っていたのか。あなたには数時間にしか感じなかった。", "「昨夜から街の井戸が全部枯れた」とマグダは続けた。「食料の腐りが早い。子供が夢で泣き叫ぶ。何かが始まってる」", "ナックが空を見上げた。「満月まで一日だ」"], "note": "", "end": "", "choices": [{"next": "三百五十六", "label": "すぐに同盟を求めて出発するなら三百五十六へ進め。"}, {"next": "八百二", "label": "マグダに何か情報がないか聞くなら八百二へ進め。"}]}, "八百二": {"id": "八百二", "num": "八百二", "text": ["「闇の商会の連中が動いている」とマグダは声を落とした。「昨夜、街に十人ほどの武装した集団が来た。三日月と蛇の徽章をつけていた。神殿に向かった」", "あなたは「謎の金属円盤」を持っているならそれをマグダに見せた。", "「それだ」とマグダは頷いた。「その徽章だ。オルド司祭が狙われてるかもしれない。神殿を確認した方がいい」"], "note": "", "end": "", "choices": [{"next": "八百三", "label": "神殿へ急ぐなら八百三へ進め。"}, {"next": "三百五十六", "label": "先に出発するなら三百五十六へ進め。"}]}, "八百三": {"id": "八百三", "num": "八百三", "text": ["神殿に駆けつけると、扉が破られていた。中で物音がする。", "踏み込むと、三人の男たちがオルドを囲んでいた。老司祭は壁際に追い詰められ、しかし恐れていない。むしろ静かに彼らを見据えていた。", "「ヴォルカネスの復活を止めようとする者は始末しろと命令を受けている」と男の一人が言った。", "「始末してみるがいい」とオルドは言った。「神に仕える者を害する報いを受けるのはお前たちだ」", "あなたは剣を抜いた。"], "note": "闇の商会の刺客三人（技術点七／体力点八）と戦え。経験値は一体につき一点。", "end": "", "choices": [{"next": "八百四", "label": "勝利したなら八百四へ進め。"}, {"next": "四百七十三", "label": "体力点が零になったなら四百七十三へ進め。"}]}, "八百四": {"id": "八百四", "num": "八百四", "text": ["刺客たちを退けると、オルドは深く頭を下げた。", "「助かった。あなたが来てくれなければ」と彼は言った。", "オルドは懐から小瓶を取り出した。「これを持っていけ。聖水だ。一度だけ使える。最終決戦で、ヴォルカネスに投げかけると体力点を八点減らすことができる。ただし」彼は真剣な顔で言った。「もし第三の道を選ぶなら、使ってはいけない。聖水は浄化するものだ。救うためには使えない」"], "note": "「聖水」を入手した。所持品欄に記録せよ。ただし「第三の道を選ぶ場合は使用不可」と記録せよ。", "end": "", "choices": [{"next": "三百五十六", "label": "出発するなら三百五十六へ進め。"}]}, "八百五": {"id": "八百五", "num": "八百五", "text": ["道中、ナックがぽつりと言った。", "「俺の故郷はここから東に三日のところにある小さなゴブリンの集落だ。じいちゃんが死んで、仲間に追い出されて、ドーランに来た」", "「なぜ追い出された」", "「字が読めるから」ナックは苦く笑った。「ゴブリンの世界では、人間の言葉や文字を覚えることは裏切りとみなされる。俺はじいちゃんに習ったせいで、村を出るしかなかった」", "しばらく沈黙が続いた。", "「でも」とナックは続けた。「今はよかったと思ってる。字が読めなかったら、お前に会っても役に立てなかった。あの日誌も読めなかった。じいちゃん、ありがとうってか」"], "note": "", "end": "", "choices": [{"next": "三百六十八", "label": "先へ進むなら三百六十八か三百七十五または三百八十三へ進め。"}]}, "八百六": {"id": "八百六", "num": "八百六", "text": ["夜、野営中にシラが話しかけてきた。", "「一つだけ、あなたに言っておかなければならないことがある」と彼女は言った。", "「なんだ」", "「あなたの左手の紋章。あれは偶然ではない」シラは静かに言った。「オルト＝ヴァルが魂の半分を失った時、その半分は消えたのではなく……分散した。世界に散らばった。そして三百年の時をかけて、一人の人間の中に集まった。あなただ」", "あなたは左手を見た。", "「あなたはオルト＝ヴァルの失われた魂の器だ」とシラは続けた。「だから紋章があり、遺跡があなたを引き寄せた。最終決戦で彼と対峙した時――あなたの中に彼の記憶が蘇るかもしれない。それはあなたを迷わせるかもしれない。でも」彼女は言った。「迷っていい。迷うことは弱さではない」"], "note": "「主人公はオルト＝ヴァルの失われた魂の器」とメモ欄に記録せよ。最終決戦での選択に深みが加わる。", "end": "", "choices": [{"next": "四百二", "label": "先へ進むなら四百二へ進め。"}]}, "八百七": {"id": "八百七", "num": "八百七", "text": ["四百二に向かう前夜、ゴルムがあなたの隣に座った。", "「儂はずっと嘘をついていた」と彼は言った。「あの夜、引き返したのは怖かったからではない」", "あなたは黙って聞いた。", "「兄が儂に言ったんだ。『行くな』と。ではなく、『帰れ』と。兄は最初から知っていたんだ。自分がここに残ることを。儂を守るために引き留めたんだ。儂はそれを知っていながら、五十年間、引き返したことを後悔のように話してきた。本当は……感謝していた。ただ言えなかった」", "ゴルムは立ち上がった。「お前が星の間から帰ってきたら、兄の話をもっとしたい。聞いてくれるか」"], "note": "「ゴルムの本当の心を聞いた」とメモ欄に記録せよ。GOOD END 2の後日譚に影響する。", "end": "", "choices": [{"next": "四百二", "label": "「必ず帰る」と言って眠るなら四百二へ進め。"}]}, "九百一": {"id": "九百一", "num": "九百一", "text": ["階段を下りた瞬間、膨大な何かが流れ込んできた。", "記憶だ。しかし自分の記憶ではない。見知らぬ景色。見知らぬ顔。見知らぬ声。しかし不思議なことに、懐かしかった。", "白い塔。星の満ちた夜空。弟子の笑顔。そして――暗闇。痛み。失くすことの恐怖。", "あなたは立ち止まった。左手の紋章が激しく脈打っている。", "「大丈夫か」とゴルムの声が遠くから聞こえた。", "大丈夫だ、とあなたは答えた。しかし本当に大丈夫なのかは分からなかった。あなたの中で何かが目覚めようとしていた。"], "note": "", "end": "", "choices": [{"next": "九百二", "label": "記憶を受け入れて進むなら九百二へ進め。"}, {"next": "三百二十四", "label": "記憶を押しつぶして進むなら三百二十四へ進め。"}]}, "九百二": {"id": "九百二", "num": "九百二", "text": ["記憶の洪水に身を委ねた。", "映像が流れた。黄金時代の賢者たちの日々。星脈術の研究。笑い声。議論。そしてある夜、一人の若い弟子が事故で死んだ。その瞬間から、すべてが変わった。", "悲しみ。怒り。否定。そして決意。「取り戻す。何があっても取り戻す」", "あなたはその感情を全身で感じた。理解した。オルト＝ヴァルが間違えた理由を。人間であることの脆さを。愛することの恐ろしさを。", "記憶が引いた。あなたは涙が出ていることに気づいた。"], "note": "「オルト＝ヴァルの記憶を受け入れた」とメモ欄に記録せよ。第三の道（魂の還元）が解放される。技術点に一点を加えよ。", "end": "", "choices": [{"next": "三百二十四", "label": "星の間へ進むなら三百二十四へ進め。"}]}, "九百三": {"id": "九百三", "num": "九百三", "text": ["ヴォルカネスはあなたを見て、何かを感じたように動きを止めた。", "「……お前の中に」と彼は言った。今まで聞いたことのない声だった。威圧でも冷酷でもなく、ただ驚きだけがあった。「私の……」", "「オルト＝ヴァル」とあなたは言った。「あなたの本当の名前だ」", "星の間が静まり返った。", "ヴォルカネスの目の光が揺れた。三百年間、その名を誰も呼ばなかった。呼ぶ者がいなかった。", "「……そうだ」と彼は低く言った。「私はオルト＝ヴァルだった。かつては」"], "note": "", "end": "", "choices": [{"next": "九百四", "label": "「今もあなたはオルト＝ヴァルだ」と言うなら九百四へ進め。（第三の道）"}, {"next": "四百十五", "label": "「かつての名は関係ない」と言って戦うなら四百十五へ進め。"}]}, "九百四": {"id": "九百四", "num": "九百四", "text": ["「今もあなたはオルト＝ヴァルだ」とあなたは繰り返した。「魂の半分を失っても、三百年かけて別の存在になっても、根のところは変わっていない。あなたはまだ賢者だ」", "ヴォルカネスの全身が揺れた。鎧の隙間から光が漏れた。青白い光ではなく――金色の光だ。", "「私を……救えると言うのか」と彼は掠れた声で言った。", "「救うのではない」とあなたは言った。「返すんだ。あなたの魂の半分を。私の中にある、あなたの一部を」", "左手の紋章が激しく輝いた。"], "note": "この選択には条件がある。以下をすべて満たしているか確認せよ。「オルト＝ヴァルの記憶を受け入れた」「ヴォルカネスの真の名を知っている」「日誌を読んだ」。すべて満たしているなら九百五へ進め。一つでも欠けているなら九百六へ進め。", "end": "", "choices": []}, "九百五": {"id": "九百五", "num": "九百五", "text": ["あなたは左手を前に伸ばした。", "紋章が光り、その光が細い糸のようにヴォルカネスへと伸びていった。彼は動かなかった。動けなかったのか、動かなかったのか。", "光が彼に触れた瞬間、星の間全体が揺れた。", "ヴォルカネスは声を上げた。苦しみではなかった。何百年もの重さが一度に溶け出すような――解放の声だった。", "鎧が崩れた。中から光が溢れた。人の形をした光。老いた男の姿。白い衣を纏い、穏やかな顔をしている。鏡の中で見た顔と同じ顔だ。", "光の男はあなたを見て、深く頭を下げた。言葉はなかった。言葉は必要なかった。", "そして光は消えた。静寂だけが残った。"], "note": "", "end": "", "choices": [{"next": "九百七", "label": "このまま進むなら九百七へ進め。"}]}, "九百六": {"id": "九百六", "num": "九百六", "text": ["あなたは手を伸ばした。しかし光は出なかった。", "ヴォルカネスが目を細めた。「……力が足りない。お前の中にあるものを、お前自身が理解していない」", "彼は首を振った。「残念だ。しかし選択肢は戦いだけではない。帰れ。そして学べ。次があるなら」", "しかし次はない。満月は今夜だ。"], "note": "", "end": "", "choices": [{"next": "四百十五", "label": "戦うなら四百十五へ進め。"}]}, "九百七": {"id": "九百七", "num": "九百七", "text": ["あなたは膝をついた。左手の紋章が消えていた。熱も痛みも、温かさも、何も感じなかった。ただ空だった。", "それで良かった、と思った。", "星の間の天井の星図が、ゆっくりと消えていった。石に刻まれた光が一つ、また一つと消えていく。三百年かかって灯り続けたものが、ようやく眠りにつくように。", "階段から足音がした。ゴルムだった。シラも来た。ナックも来た。", "誰も何も言わなかった。言う必要がなかった。", "ゴルムが静かに言った。「帰ろう」"], "note": "", "end": "", "choices": [{"next": "九百九十一", "label": "エンディングへ進むなら九百九十一へ進め。"}]}, "九百九十一": {"id": "九百九十一", "num": "九百九十一 GOOD END 3", "text": ["ドーランへ帰る道は、来た時と同じ荒野だった。しかし空気が違った。", "青白い光が消えていた。ザル＝カラムの方角の空が、ただの夜空に戻っていた。星が見えた。三百年ぶりに、本物の星が。", "ナックが空を見上げた。「すごいな」と彼は言った。「星ってこんなに多かったのか」", "ゴルムが隣を歩きながら言った。「兄が見ていた星空も、こんな感じだったかもしれない」", "シラは何も言わなかった。ただ歩きながら、時々立ち止まって夜空を見た。その顔に涙はなかった。かわりに、三百年分の疲れが、ゆっくりと抜けていくような表情があった。", "あなたは左手を見た。紋章は消えていた。今のあなたはただの人間だ。名もなき流れ者だ。しかしもう一人ではなかった。", "ドーランの明かりが見えてきた。街門で、マグダが待っていた。腕を組んで。目を細めて。", "「帰ってきたか」と彼女は言った。「ずいぶん遅かった」", "ナックが「すみませんでした」と深々と頭を下げた。マグダは笑った。", "断片の時代は終わった。新しい時代の名前はまだなかった。しかしそれを決める者たちが、今ここにいた。"], "note": "", "end": "「救うとは、戦うことではなかった。理解することだった」――あなたの冒険は完結した。これが最も深いエンディングである。", "choices": []}, "四百三十七の二": {"id": "四百三十七の二", "num": "四百三十七の二 後日譚", "text": ["一週間後、ドーランに変化が起きた。", "枯れていた井戸から水が戻った。腐りかけていた食料が持つようになった。そして子供たちの夢が変わった。暗い扉の夢の代わりに、明るい野原の夢を見ると彼らは言った。", "ゴルムは珍しく酒を飲まなかった。錆びた剣亭の隅で、何かを書いていた。近づくとそれは手紙だった。宛先の名前は「ドゥルムへ」と書かれていた。", "ナックはドーランに留まった。マグダに頼み込んで錆びた剣亭で働くことになった。最初は客に奇妙な目で見られたが、三日目には「あのゴブリン、気が利く」と評判になっていた。", "シラは翌朝、いなくなっていた。書き置きが一枚。「テニスタ・テニストの長老に謝りに行く。時間がかかるかもしれない。でも必ず戻る」と書かれていた。", "あなたは街門に立ち、荒野を見た。もう青白い光はなかった。ただの荒野が、朝日に照らされていた。", "どこへ行こうか、とあなたは思った。今のあなたには帰る場所もあり、行くべき場所もある。それで十分だった。"], "note": "", "end": "――ヴァルデアの遺産、完。", "choices": []}, "四百四十六の二": {"id": "四百四十六の二", "num": "四百四十六の二 後日譚", "text": ["ドーランに戻った日、マグダが全員に酒を奢った。「生きて帰ったら奢ると決めていた」と彼女は言った。", "ゴルムは翌日、一人でザル＝カラムへ向かった。何もない遺跡の前に立ち、しばらく動かなかった。戻ってきた時、その顔から何年分もの皺が消えたように見えた。", "「兄に報告してきた」と彼は言った。それだけだった。しかしそれで十分だった。", "ナックは約束通り金貨十枚を受け取ったが、翌日全部使って豪遊し、一文無しになった。それからまた路地裏でうずくまっているところをあなたに発見された。", "「また奢ってくれるか」とナックは言った。", "あなたは仕方なく金貨一枚を渡した。", "世界は変わった。しかし人は変わらない。それもまた、悪くなかった。"], "note": "", "end": "「英雄とは、生き残って、また飯を食う者のことだ」――あなたの冒険は完結した。", "choices": []}};

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function go(id) {
  var scene = S[id];
  var el = document.getElementById('main');
  if (!el) return;
  if (!scene) {
    el.innerHTML = '<p style="writing-mode:horizontal-tb;color:#c00;padding:1rem;">節「' + esc(id) + '」が見つかりません</p>';
    return;
  }
  var h = '<span class="num">' + esc(scene.num) + '</span>';
  for (var i = 0; i < scene.text.length; i++) {
    h += '<p class="para">' + esc(scene.text[i]) + '</p>';
  }
  if (scene.note) {
    h += '<div class="note">' + esc(scene.note) + '</div>';
  }
  if (scene.choices && scene.choices.length > 0) {
    h += '<div class="choices">';
    for (var j = 0; j < scene.choices.length; j++) {
      var c = scene.choices[j];
      h += '<button class="cbtn" onclick="go('' + esc(c.next) + '')">' + esc(c.label) + '</button>';
    }
    h += '</div>';
  }
  if (scene.end) {
    h += '<div class="endtxt">' + esc(scene.end) + '</div>';
    h += '<button class="restart" onclick="go('一')">▲ 最初から読む</button>';
  }
  el.innerHTML = h;
  el.scrollTop = 0;
  try { history.replaceState(null, '', '#' + id); } catch(e) {}
}

var dMode = '2d6', dRoll = false;
var DOTS = {1:[[50,50]],2:[[25,25],[75,75]],3:[[25,25],[50,50],[75,75]],4:[[25,25],[75,25],[25,75],[75,75]],5:[[25,25],[75,25],[50,50],[25,75],[75,75]],6:[[25,25],[75,25],[25,50],[75,50],[25,75],[75,75]]};
function d6() { return Math.floor(Math.random() * 6) + 1; }
function dsvg(n) {
  var d = DOTS[n] || DOTS[1];
  var s = '<svg width="42" height="42" viewBox="0 0 100 100"><rect x="3" y="3" width="94" height="94" rx="15" fill="#fff" stroke="#111" stroke-width="5"/>';
  for (var i = 0; i < d.length; i++) s += '<circle cx="' + d[i][0] + '" cy="' + d[i][1] + '" r="9" fill="#111"/>';
  return s + '</svg>';
}
function buildDice() {
  var n = (dMode === '2d6' || dMode === 'stat') ? 2 : 1;
  var box = document.getElementById('dfaces');
  if (!box) return;
  box.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var d = document.createElement('div');
    d.className = 'die'; d.id = 'die' + i; d.innerHTML = dsvg(1);
    box.appendChild(d);
  }
}

var EXP = 0;
var LVLS = [{min:0,lv:1,name:'ならず者の無頼漢',next:3,fx:null},{min:3,lv:2,name:'浮足立つ冒険者',next:7,fx:{sk:1}},{min:7,lv:3,name:'豪傑の勇者',next:12,fx:{st:4}},{min:12,lv:4,name:'ヴァルデアのレジェンド',next:999,fx:{sk:1,lk:1}}];
function getLv(e) { var r = LVLS[0]; for (var i = 0; i < LVLS.length; i++) { if (e >= LVLS[i].min) r = LVLS[i]; } return r; }
function updExp(prev) {
  var lv = getLv(EXP);
  var ne = document.getElementById('expN'), fe = document.getElementById('expF'), le = document.getElementById('expL'), me = document.getElementById('emsg');
  if (ne) ne.textContent = EXP;
  if (le) le.textContent = 'Lv.' + lv.lv + ' ' + lv.name;
  var pct = lv.lv === 4 ? 100 : Math.round((EXP - lv.min) / (lv.next - lv.min) * 100);
  if (fe) fe.style.width = Math.min(100, pct) + '%';
  if (prev !== null && lv.lv > prev && lv.fx) {
    var msg = 'Lv.' + lv.lv + '「' + lv.name + '」昇格！';
    if (lv.fx.sk) { var e=document.getElementById('skc'),ei=document.getElementById('ski'); if(e&&e.value){e.value=parseInt(e.value)+lv.fx.sk;} if(ei&&ei.value){ei.value=parseInt(ei.value)+lv.fx.sk;} msg+=' 技術+'+lv.fx.sk; }
    if (lv.fx.st) { var e=document.getElementById('stc'),ei=document.getElementById('sti'); if(e&&e.value){e.value=parseInt(e.value)+lv.fx.st;} if(ei&&ei.value){ei.value=parseInt(ei.value)+lv.fx.st;} msg+=' 体力+'+lv.fx.st; }
    if (lv.fx.lk) { var e=document.getElementById('lkc'),ei=document.getElementById('lki'); if(e&&e.value){e.value=parseInt(e.value)+lv.fx.lk;} if(ei&&ei.value){ei.value=parseInt(ei.value)+lv.fx.lk;} msg+=' 運勢+'+lv.fx.lk; }
    if (me) { me.textContent = msg; setTimeout(function() { if (me) me.textContent = ''; }, 7000); }
  }
  save();
}

function rollStat(s) {
  var v = (s === 'st') ? d6() + d6() + 12 : d6() + 6;
  var ie = document.getElementById(s + 'i'), ce = document.getElementById(s + 'c');
  if (ie) { ie.value = v; ie.style.background = '#fffacd'; setTimeout(function() { ie.style.background = ''; }, 500); }
  if (ce) { ce.value = v; ce.style.background = '#fffacd'; setTimeout(function() { ce.style.background = ''; }, 500); }
  save();
}

function autoFill(sk, st, lk) {
  var si = document.getElementById('ski'), sc = document.getElementById('skc');
  var ti = document.getElementById('sti'), tc = document.getElementById('stc');
  var li = document.getElementById('lki'), lc = document.getElementById('lkc');

function buildItems() {

    r.innerHTML = '<span class="ino">' + i + '.</span><input type="checkbox" class="ichk" id="ic' + i + '"><input type="text" class="itxt" id="it' + i + '" placeholder="（空き）">';
    g.appendChild(r);
  }
  g.addEventListener('change', save); g.addEventListener('input', save);
}

function save() {
  try {
    var d = { ski:document.getElementById('ski').value, skc:document.getElementById('skc').value, sti:document.getElementById('sti').value, stc:document.getElementById('stc').value, lki:document.getElementById('lki').value, lkc:document.getElementById('lkc').value, exp:EXP, paw:document.getElementById('pawS').classList.contains('on')?'s':'u', gold:document.getElementById('gold').value, food:document.getElementById('food').value, memo:document.getElementById('memo').value, items:[] };
    for (var i = 1; i <= 8; i++) { var c=document.getElementById('ic'+i),t=document.getElementById('it'+i); d.items.push({c:c?c.checked:false,t:t?t.value:''}); }
    sessionStorage.setItem('vs', JSON.stringify(d));
  } catch(e) {}
}

function load() {
  try {
    var raw = sessionStorage.getItem('vs'); if (!raw) return;
    var d = JSON.parse(raw);
    function sv(id,v){var e=document.getElementById(id);if(e&&v!==undefined&&v!=='')e.value=v;}
    sv('ski',d.ski); sv('skc',d.skc); sv('sti',d.sti); sv('stc',d.stc); sv('lki',d.lki); sv('lkc',d.lkc); sv('gold',d.gold); sv('food',d.food);
    if (d.memo) document.getElementById('memo').value = d.memo;
    if (d.exp !== undefined) { EXP = d.exp; updExp(null); }
    if (d.paw === 's') { document.getElementById('pawS').classList.add('on'); document.getElementById('pawU').classList.remove('on'); }
    if (d.items) { d.items.forEach(function(item,i){var c=document.getElementById('ic'+(i+1)),t=document.getElementById('it'+(i+1));if(c)c.checked=item.c;if(t)t.value=item.t;}); }
    ['sk','st','lk'].forEach(function(s){var e=document.getElementById(s+'i');if(e&&e.value){var b=document.querySelector('.sr[data-s="'+s+'"]');if(b){b.textContent='✓';b.classList.add('done');b.disabled=true;}}});
  } catch(e) {}
}

window.onload = function() {
  var hash = location.hash.slice(1);
  go((hash && S[hash]) ? hash : '一');

  var dms = document.querySelectorAll('.dmode');
  for (var i = 0; i < dms.length; i++) {
    dms[i].addEventListener('click', function() {
      dMode = this.getAttribute('data-m');
      for (var j = 0; j < dms.length; j++) dms[j].classList.remove('on');
      this.classList.add('on');
      buildDice();
      document.getElementById('dresult').textContent = '';
    });
  }
  buildDice();

  document.getElementById('drollBtn').addEventListener('click', function() {
    if (dRoll) return; dRoll = true;
    var n = (dMode === '2d6' || dMode === 'stat') ? 2 : 1, res = [];
    for (var i = 0; i < n; i++) res.push(d6());
    var f = 0, iv = setInterval(function() {
      for (var i = 0; i < n; i++) { var e = document.getElementById('die' + i); if (e) e.innerHTML = dsvg(d6()); }
      if (++f >= 16) {
        clearInterval(iv);
        for (var i = 0; i < n; i++) { var e = document.getElementById('die' + i); if (e) e.innerHTML = dsvg(res[i]); }
        var t = res.reduce(function(a,b){return a+b;},0), re = document.getElementById('dresult');
        if (dMode === '2d6') re.innerHTML = '合計 <strong>' + t + '</strong> (' + res.join('+') + ')';
        else if (dMode === '1d6') { var m={1:'完全暴走',2:'一撃必殺',3:'技術-2',4:'一撃必殺',5:'行動不能',6:'一撃必殺'}; re.innerHTML = '出目 <strong>' + res[0] + '</strong>: ' + m[res[0]]; }
        else if (dMode === 'stat') { var sk=res[0]+6,st=res[0]+res[1]+12,lk=res[1]+6; re.innerHTML='技術:<strong>'+sk+'</strong> 体力:<strong>'+st+'</strong> 運勢:<strong>'+lk+'</strong>'; autoFill(sk,st,lk); }
        else if (dMode === 'luck') { var cur=parseInt(document.getElementById('lkc').value)||0,ok=t<=cur; re.innerHTML=t+' vs '+cur+' → <strong style="color:'+(ok?'#111':'#c00')+'">'+(ok?'成功':'失敗')+'</strong>'; if(cur>0){document.getElementById('lkc').value=Math.max(0,cur-1);save();} }
        dRoll = false;
      }
    }, 50);
  });

  document.getElementById('fabDice').addEventListener('click', function() {
    var p = document.getElementById('diceWrap'), s = document.getElementById('sheetBg');
    var op = !p.classList.contains('open');
    p.classList.toggle('open');
    if (s) s.classList.remove('open');
    if (op) buildDice();
  });

  document.addEventListener('click', function(e) {
    var p = document.getElementById('diceWrap'), b = document.getElementById('fabDice');
    if (p && p.classList.contains('open') && !p.contains(e.target) && !b.contains(e.target)) p.classList.remove('open');
  });

  document.getElementById('fabSheet').addEventListener('click', function() {
    var m = document.getElementById('sheetBg'), p = document.getElementById('diceWrap');
    m.classList.toggle('open');
    if (p) p.classList.remove('open');
    if (m.classList.contains('open')) { buildItems(); load(); }
  });
  document.getElementById('sheetClose').addEventListener('click', function() { document.getElementById('sheetBg').classList.remove('open'); });
  document.getElementById('sheetBg').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });

  var srs = document.querySelectorAll('.sr');
  for (var i = 0; i < srs.length; i++) srs[i].addEventListener('click', function() { rollStat(this.getAttribute('data-s')); this.textContent = '✓'; this.classList.add('done'); this.disabled = true; });
  document.getElementById('rollAll').addEventListener('click', function() {
    var bs = document.querySelectorAll('.sr');
    for (var i = 0; i < bs.length; i++) { if (!bs[i].disabled) { rollStat(bs[i].getAttribute('data-s')); bs[i].textContent = '✓'; bs[i].classList.add('done'); bs[i].disabled = true; } }
  });
  var sas = document.querySelectorAll('.sa');
  for (var i = 0; i < sas.length; i++) sas[i].addEventListener('click', function() {
    var s = this.getAttribute('data-s'), d = parseInt(this.getAttribute('data-d'));
    var ce = document.getElementById(s + 'c'), ie = document.getElementById(s + 'i');
    var max = parseInt(ie ? ie.value : 99) || 99;
    if (ce) { ce.value = Math.max(0, Math.min(max, (parseInt(ce.value) || 0) + d)); ce.style.background = '#fffacd'; setTimeout(function(){ce.style.background='';},400); save(); }
  });

  var ebs = document.querySelectorAll('.ebtn');
  for (var i = 0; i < ebs.length; i++) ebs[i].addEventListener('click', function() { var prev = getLv(EXP).lv; EXP = Math.max(0, Math.min(20, EXP + parseInt(this.getAttribute('data-e')))); updExp(prev); });

  document.getElementById('pawU').addEventListener('click', function() { this.classList.add('on'); document.getElementById('pawS').classList.remove('on'); save(); });
  document.getElementById('pawS').addEventListener('click', function() { this.classList.add('on'); document.getElementById('pawU').classList.remove('on'); save(); });

  var gfas = document.querySelectorAll('.gfa');
  for (var i = 0; i < gfas.length; i++) gfas[i].addEventListener('click', function() {
    var id = this.getAttribute('data-id'), d = parseInt(this.getAttribute('data-d')), el = document.getElementById(id), max = id === 'food' ? 10 : 999;
    if (el) { el.value = Math.max(0, Math.min(max, (parseInt(el.value) || 0) + d)); save(); }
  });

  document.getElementById('resetBtn').addEventListener('click', function() {
    if (!confirm('シートをリセットしますか？')) return;
    ['sk','st','lk'].forEach(function(s) { var ie=document.getElementById(s+'i'),ce=document.getElementById(s+'c'); if(ie)ie.value=''; if(ce)ce.value=''; });
    var bs = document.querySelectorAll('.sr'); for (var i=0;i<bs.length;i++){bs[i].textContent='振る';bs[i].classList.remove('done');bs[i].disabled=false;}
    document.getElementById('gold').value=3; document.getElementById('food').value=0; document.getElementById('memo').value='';
    EXP=0; updExp(null);
    document.getElementById('pawU').classList.add('on'); document.getElementById('pawS').classList.remove('on');
    for (var i=1;i<=8;i++){var c=document.getElementById('ic'+i),t=document.getElementById('it'+i);if(c)c.checked=false;if(t)t.value='';}
    try{sessionStorage.removeItem('vs');}catch(e){}
  });

  document.getElementById('sheetBg').addEventListener('change', save);
  document.getElementById('sheetBg').addEventListener('input', save);

  updExp(null);
  buildItems();
};
</script>
</body>
</html>
