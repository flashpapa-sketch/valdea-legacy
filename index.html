<style>
:root{--bg:#0d0d0f;--fg:#e8e0d0;--acc:#b8860b;--acc2:#8b6914;--dim:#7a7060}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:"Noto Serif JP",Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.wrap{max-width:600px;width:100%;text-align:center}
.sub{font-size:.8rem;letter-spacing:.3em;color:var(--acc);margin-bottom:1.5rem}
h1{font-size:2.4rem;font-weight:700;letter-spacing:.1em;line-height:1.2;margin-bottom:.5rem}
.en{font-size:1rem;letter-spacing:.3em;color:var(--dim);margin-bottom:2.5rem}
hr{border:none;border-top:1px solid var(--acc2);margin:2rem auto;width:60%}
.catch{font-size:1.05rem;line-height:2;margin-bottom:2rem}
.features{list-style:none;text-align:left;display:inline-block;margin-bottom:2.5rem}
.features li{padding:.3rem 0;font-size:.95rem;color:var(--dim)}
.features li::before{content:"◆ ";color:var(--acc)}
.btns{display:flex;flex-direction:column;gap:1rem;align-items:center;margin-bottom:2.5rem}
.btn{display:inline-block;padding:.9rem 2.5rem;border:1px solid var(--acc);color:var(--acc);text-decoration:none;letter-spacing:.15em;font-size:.95rem;transition:all .2s}
.btn:hover{background:var(--acc);color:var(--bg)}
.btn-main{background:var(--acc);color:var(--bg);font-weight:700}
.btn-main:hover{background:var(--acc2)}
.tags{font-size:.8rem;color:var(--dim);line-height:2}
.foot{margin-top:3rem;font-size:.75rem;color:var(--dim);letter-spacing:.1em}
.lang-toggle{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.lang-btn{display:inline-block;padding:.4rem 1.2rem;border:1px solid var(--acc2);color:var(--dim);background:none;font-size:.8rem;letter-spacing:.15em;text-decoration:none;transition:all .2s;cursor:pointer}
.lang-btn.active{background:var(--acc);color:var(--bg);border-color:var(--acc)}
.lang-btn:hover{border-color:var(--acc);color:var(--acc)}
</style>
</head>
<body>
<main class="wrap" role="main">
  <nav class="lang-toggle" role="navigation" aria-label="言語選択">
    <a href="?lang=ja" class="lang-btn" id="btn-ja" aria-label="日本語に切り替え">日本語</a>
    <a href="?lang=en" class="lang-btn" id="btn-en" aria-label="Switch to English">English</a>
  </nav>
  <p class="sub" id="txt-sub"></p>
  <h1 id="txt-title"></h1>
  <p class="en" lang="en">valdea legacy</p>
  <p class="catch" id="txt-catch"></p>
  <hr aria-hidden="true">
  <ul class="features" id="txt-features" role="list"></ul>
  <div class="btns">
    <a href="game.html?new=1" class="btn btn-main" id="btn-start" aria-label="すぐに冒険を始める"></a>
    <a href="game.html" class="btn" id="btn-resume" style="display:none" aria-label="保存した冒険を再開する"></a>
    <a href="guide.html" class="btn" id="btn-guide" aria-label="詳しいルールを見る"></a>
  </div>
  <p class="tags" id="txt-tags" aria-label="タグ"></p>
  <footer class="foot" id="txt-foot"></footer>
</main>
<script>
var T={
  ja:{sub:'観測者のいない記録',title:'観測者のいない記録',catch:'あなたは流れ者の冒険者。<br>左手に刻まれた古代の紋章が、<br>断片の時代の命運を握っている。',features:['ひとりで読み進める本格ゲームブック','選択肢とサイコロが運命を決める','経験値・レベルアップシステム搭載','「猿の右手」― 一度だけ使える諸刃の切り札','デジタル冒険者シート・ダイスローラー内蔵'],guide:'📖 詳しいルールを見る',start:'⚡ すぐ冒険を始める',resume:'◆ 冒険を再開する',tags:'#観測者のいない記録　#ゲームブック　#創作　#猿の右手　#TRPG',foot:'観測者のいない記録　valdea legacy　／　Web版'},
  en:{sub:'The Unobserved Record',title:'The Unobserved Record',catch:'You are a wandering adventurer.<br>The ancient mark carved into your left hand<br>holds the fate of the Age of Fragments.',features:['A full-scale solo gamebook','Your choices and the dice decide your fate','Experience and level-up system included','"The Monkey\'s Paw" — a double-edged trump card, usable only once','Digital adventurer sheet and dice roller built in'],guide:'📖 View Detailed Rules',start:'⚡ Start Adventure Now',resume:'◆ Resume Adventure',tags:'#valdea #gamebook #fiction #monkeyspaw #TRPG',foot:'The Unobserved Record — valdea legacy — Web Edition'}
};

// URLパラメータ優先、なければlocalStorage
var params=new URLSearchParams(window.location.search);
var lang=params.get('lang')||localStorage.getItem('valdea_lang')||'ja';
if(params.get('lang')) localStorage.setItem('valdea_lang',lang);

// HTML lang属性を更新
document.documentElement.lang = lang;

var t=T[lang]||T.ja;
document.getElementById('btn-ja').className='lang-btn'+(lang==='ja'?' active':'');
document.getElementById('btn-en').className='lang-btn'+(lang==='en'?' active':'');
document.getElementById('txt-sub').textContent=t.sub;
document.getElementById('txt-title').textContent=t.title;
document.getElementById('txt-catch').innerHTML=t.catch;
var ul=document.getElementById('txt-features');
t.features.forEach(function(f){var li=document.createElement('li');li.textContent=f;ul.appendChild(li);});
document.getElementById('btn-guide').textContent=t.guide;
document.getElementById('btn-start').textContent=t.start;
document.getElementById('btn-resume').textContent=t.resume;
document.getElementById('txt-tags').textContent=t.tags;
document.getElementById('txt-foot').textContent=t.foot;

// セーブデータがあれば「冒険を再開する」ボタンを表示
var hasSave=!!localStorage.getItem('valdea_save');
if(hasSave){
  document.getElementById('btn-resume').style.display='inline-block';
}
</script>
</body>
</html>
