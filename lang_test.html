<style>
:root{--bg:#0d0d0f;--fg:#e8e0d0;--acc:#b8860b;--acc2:#8b6914;--dim:#7a7060;--card:#1a1814}
body{background:var(--bg);color:var(--fg);font-family:Georgia,serif;padding:1rem;max-width:600px;margin:0 auto}
.para-body p{margin-bottom:.8rem;font-size:.95rem;line-height:1.9}
.choice-btn{display:block;width:100%;margin:.3rem 0;padding:.6rem 1rem;background:var(--card);border:1px solid var(--acc2);color:var(--fg);cursor:pointer;text-align:left;font-size:.88rem}
.choice-btn:hover{border-color:var(--acc);color:var(--acc)}
#lang-btn{position:fixed;top:.5rem;right:.5rem;background:var(--card);border:1px solid var(--acc2);color:var(--acc);padding:.3rem .7rem;font-size:.75rem;cursor:pointer}
#log{background:#111;padding:.5rem;margin-top:1rem;font-size:.75rem;color:#60d080;font-family:monospace;max-height:150px;overflow-y:auto}
.para-num{font-size:.7rem;letter-spacing:.25em;color:var(--acc2);margin-bottom:.3rem}
.para-num span{font-size:1.05rem;font-weight:700;color:var(--acc)}
</style>
</head><body>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<script>
const PARA_EN = {"一": ["Wind drives dust across the Valdea wasteland. You turn your back to it and study the outline of a town on the horizon. Doran. A frontier trading post. Once a vital hub on the northern trade routes, it fell when the Golden Age collapsed. Now it is little more than a windblown backwater.", "Your left hand is hot. The mark. The ancient sigil you were born with burns today like it never has. The closer you draw to Zal-Karam, the more it burns. Something sealed three hundred years ago is calling to you.", "The gates of Doran come into view. Two guards stand with spears. You keep walking."], "二": ["There is a notice board beside the gate. Several faded papers are pinned to it — old job postings and wanted notices, mostly. One sheet is fresh.", "\"Zal-Karam Survey Party — Seeking Members. Reward: 50 gold. Posted by: Doran Merchants' Guild.\"", "Beneath it, another sheet is tacked on top. \"Warning: In the past three months, 47 adventurers have set out for Zal-Karam. Survivors: Zero.\"", "The mark on your hand burns again."], "三": ["\"Iron Claw\" is a weapons shop two alleys from the gate. An elderly dwarven craftsman polishes a sword. The left side of his face is covered in old burn scars. Rumour has it he is one of the few who made it back from Zal-Karam — but he never speaks of it. Half the shelves stand empty.", "Three weapons are available. Shortsword (3 gold). Sword (8 gold). Hand axe (5 gold)."], "四": ["You pay three gold and the craftsman hands over the shortsword without a word. The blade is old but well-maintained. It will serve.", "As you reach for it, the craftsman speaks low. \"...Fifty years ago there was someone else with that mark. Walked into that ruin. Never came back.\"", "He says nothing more and returns to his work."], "五": ["\"...Do not go there,\" the craftsman says. \"Fifty years ago, seven of us went in. I was the only one who came back. The others were drawn away by the voices of the dead. That ruin finds what is weakest in you and pushes on it.\"", "\"Those who carry that mark — it hits them especially hard,\" he continues. \"The ruin pulls you toward it. That is why your hand burns. You know it already.\"", "You look at your left hand. The craftsman resumes polishing. The conversation is over."], "六": ["A small figure lurks in a narrow alley between two inns. A goblin. Large ears, greenish skin, a patchwork cloak. Two short blades hang at the waist — for show, you suspect, not for fighting.", "The figure spots you and presses flat against the wall. But it does not run. Those eyes take your measure with the calm of someone who has survived by reading people."], "七": ["The goblin takes what you offer and stares. \"Call me Nack. I deal in information. Found this today —\" he pulls a small stone tablet from his pocket. \"Merchant threw it away. I read it. Says: Zal-Karam, basement level one, left corridor, third door. What's behind the door — no idea. But it's worth something.\"", "Nack glances at the mark on your left hand. \"You're heading to Zal-Karam. I can tell. So — two gold for the information. Deal?\""], "八": ["\"My grandfather told me this,\" Nack says. \"Three hundred years ago, the night the Golden Age ended, there was a massive explosion at Zal-Karam. From that night on, every star-vein sorcerer in Valdea lost their power. As if the earth's veins dried up overnight.\"", "\"They say Volcaness did it. Used to be a brilliant scholar, apparently. Then something went wrong. Now he's sealed inside the ruin. Has been for three hundred years.\"", "Nack's ears are straight up. \"Has your mark always glowed like that?\""], "九": ["Nack lowers his voice. \"I'll be straight with you. I thought I could use you. Figured if we went to Zal-Karam together, I could get my hands on Golden Age relics. Sell them. Get out of this town.\"", "He looks away. \"But when I saw your mark, I knew this wasn't that kind of thing. You're being pulled. I can feel it. Informant's instinct.\"", "\"So here it is. Take me with you. I know every road and every rumour between here and there. That's my offer.\""], "十": ["\"I don't have enough gold,\" you say honestly.", "Nack's ears perk up. \"Straight talker. Fine — no gold needed. Instead, when we find something in Zal-Karam, let me pick one item. That's enough.\"", "\"Just one condition. If it comes to a fight, I go first. I'm an information dealer, not a warrior.\""], "十一": ["Blue-white light flickers to the north. Zal-Karam. They say it grows a little stronger each night. From your inn window, you can see a figure moving in the alley below.", "\"That adventurer with the mark — we can use them.\" A voice leaks through the door. Another answers: \"If they have the mark, the ruin's door will open. We need that mark.\"", "You reach for your sword."], "十一の二": ["When you drop into the alley, the figure is already gone. But something lies on the ground — a small metal disc, thumb-sized, engraved with fine patterns. You pick it up. The mark on your left hand responds.", "The reverse side bears writing. In the ancient tongue: The Shadow Guild."], "十二": ["\"Something I can help you with?\" Magda wipes a cup with a cloth, glancing your way. A hobbit woman who once served in Doran's watchmen, so they say. Her eyes carry the sharpness of someone who has survived this town for a long time.", "The tavern is half-full. Most look like adventurers. All of them are heading to Zal-Karam, you'd bet. None of them are coming back."], "十三": ["\"Twenty years in this town,\" Magda says. \"Dozens of adventurers, all heading for Zal-Karam. Not one came back. They still come. You know why?\"", "\"Because they're being pulled. The stronger that light gets, the more their eyes change when they arrive. Not greed or adventure-hunger. They're being called.\"", "Magda looks at your left hand. \"You've got the same eyes.\""], "十四": ["\"Because I've seen it too,\" Magda says quietly. \"Since the day I came to this town twenty years ago. Same dream, every night. That's why I can't leave. But after twenty years of the same dream, I'm not afraid anymore.\"", "\"I'll tell you one thing. Zal-Karam has three levels underground. Surface, level one, level two. At the bottom is the Chamber of Stars. That's where the answers are. What kind of answers — I don't know.\"", "The hand with the cloth goes still. \"Come back alive.\""], "十五": ["\"Fifty years ago, I had a brother. Dorm, his name was. When I heard he meant to go to Zal-Karam, I told him to stop. He didn't listen.\"", "The old dwarf's voice goes quiet for a moment. \"My brother's name is on a stone tablet there. There's one in the lower level — names of every adventurer who died inside. Fifty years ago there was still space on it. By now it must be full.\"", "\"So I'm going. To see his name with my own eyes. That's all.\""], "十六": ["Sira lowers her eyes. \"I knew Volcaness. The man he was before. Three hundred years ago he was called Olt-Val — a star-vein sorcerer. Quiet. Devoted to his research.\"", "\"What changed him, I don't know. One day he was different. He tried to claim the star-veins of Valdea for himself alone. Many died. I ran. I was weak.\"", "\"Three hundred years. I have been here, near where he was sealed. I don't fully understand why myself.\""], "十七": ["\"One question — are you afraid?\" you ask.", "Gorm stops and is silent for a moment. Then he laughs, low. \"Fifty years ago, yes. Now it's different. The anger is bigger than the fear. Anger at what took my brother. Anger outlasts fear.\"", "\"That's what kept me alive for fifty years.\""], "十八": ["A man lies at the back of the temple. Human, early thirties, his leather armour shredded. He is conscious but his face is ashen. Five days ago he entered Zal-Karam with fifteen companions, aiming for the first basement level.", "\"The guardians spotted us,\" he says. \"Everyone ran. I was the only one who got out. The others... are all still inside.\"", "No light in his eyes."], "十九": ["\"What is in the Scholar's Chamber?\" you ask.", "Oldo traces the parchment with one finger. \"Only those who bear the mark may enter. The door has not opened for anyone without it in three hundred years. What lies within — I cannot say. But the key to sealing Volcaness is there.\"", "\"That mark was engraved by a scholar three hundred years ago. Your ancestor — or perhaps you yourself were present at that moment.\""], "二十": ["You show the metal disc to Oldo and the old priest's colour drains. \"This is... the mark of the Shadow Guild. They want Volcaness to return. They profit from the current disorder.\"", "He reads the reverse and hands it back quickly. \"Keep it. But be careful. Whoever bears this mark is somewhere in the town right now.\"", "Wind groans outside the temple."], "二十六": ["The second-floor room is small but clean. One gold. You lie on the straw bed and feel the heat of your left hand as you close your eyes.", "You dream. In the dark, a vast door. Ancient script carved across it. The mark on your hand glows and the door begins to open.", "You wake before it does. Before dawn. The hand is hot."], "三十五": ["You drop a gold piece on the counter. Magda tucks it away and drops her voice further. \"Since that light started burning at Zal-Karam, the faces of those who gather here have changed. Not ordinary adventurers. Something else in their eyes. The eyes of people being called.\"", "\"Three days ago, men in black robes were asking around. Looking for someone with a mark. Someone is hunting you.\""], "三十六": ["A young man sits alone at the end of the counter. Early twenties. Handsome features, but worn down. Lean, though you can see a trained body under the leather armour. A long sword at his hip — but the sword bears a noble family crest.", "\"Third son of a Paro noble house. Name's Larhas. I've had three commissions to enter Zal-Karam. All three were cancelled when the clients died. Coming with you. Odds of surviving go up.\""], "三十七": ["Larhas draws an old parchment from his leather satchel. A survey of Zal-Karam's surface level. \"I've studied the guardian golems' movement patterns,\" he says. \"They respond to sound and light. Move quietly and quickly and there are three positions you can pass through undetected.\"", "The chart is precise. Weeks of work, clearly."], "四十七": ["\"The Rusty Blade\" is the only decent tavern in Doran. You push open the door and tobacco smoke and tallow grease hit your nose. The hobbit landlady eyes you with suspicion from behind the counter.", "Several figures at the tables. Adventurer-types, a local merchant, and one person with a hood pulled deep. All glance at you and look away."], "五十八": ["The old dwarf's name is Gorm. \"Fifty years ago I fought in this wasteland,\" he says in a low voice. He once commanded the royal guard, so they say — but only traces of that remain.", "\"My brother died in Zal-Karam. Fifty years ago. I carry it still. So I'm going. I want to travel with you. If you refuse, I won't stop you.\"", "His right hand has four fingers, not five. Something paid for."], "六十一": ["The temple stands at the north end of town. A plain stone building, door firmly shut. You knock. A silence, then the door opens a crack.", "Old eyes peer out. A priest. He sees the mark on your left hand and opens the door wide. \"I have been expecting you,\" he says."], "八十三": ["The old dwarf looks hard at your left hand. \"...That mark,\" he says. \"Where did you get it?\"", "\"I was born with it.\"", "The three exchange glances. The old dwarf stands."], "九十二": ["The hood falls back. Long silver hair, green eyes that hold the weight of centuries. An elf. A silver pendant at the throat — a Golden Age amulet.", "\"Three hundred years I have waited in this place,\" the elf says. \"For one who carries the mark. For you.\"", "\"My name is Sira. There are things I must tell you.\""], "百七": ["The priest's name is Oldo. He leads you to a small back room and spreads a trembling parchment on the table. A map of Zal-Karam — three underground levels charted in detail.", "\"The surface level is guarded by the sentinel golems. The first basement holds research chambers. The second holds the temple — a star-vein altar. Your mark will allow you to touch it.\"", "Oldo folds the parchment and passes it to you. \"Take this. It may save your life.\""], "百二十三": ["\"The surface is guarded by the sentinel golems. Level one: research chambers. Level two: the temple — a star-vein altar. Your mark will let you touch it,\" Oldo says.", "\"Below that is the Chamber of Stars. Where Volcaness is sealed. No one who has gone there in three hundred years has returned.\""], "百四十五": ["Not far beyond the gate, a figure stands in the middle of the road.", "Enormous. Twice a man's height. Black iron armour, a greatsword planted in the earth beside it. An orc. Its eyes are red, catching the wasteland light.", "\"Toll,\" the orc says. \"Five gold. No payment — you die.\""], "百五十二": ["You are thirty minutes into the wasteland when something bursts from behind a rock.", "A goblin — but not an ordinary one. Twice the size of a man, with grotesquely overdeveloped limbs. Half its face is burned away. Four eyes. A Goblin Brute — a mutation born from Golden Age experiments.", "Its roar carries across the wasteland."], "百六十七": ["\"Come with us?\" you say to the leader. The man with the red scarf studies you for a moment.", "\"...You've got the mark,\" he says, low. \"I've seen one like it. Only once. Is it real?\"", "\"It's real.\"", "\"We're not suited for this. Good in a fight, but ruins are different. We can tell you what we know about this wasteland, though.\""], "百七十九": ["Three bandits. Each carries a short blade and wears leather armour. The leader is a man in his thirties with an old scar across his forehead, hungry light in his eyes.", "\"Your purse,\" the leader says. \"You've got a mark — means you've got gold.\""], "百八十八": ["You reach the forest entrance after midnight. Old trees close overhead and the stars disappear. Sira leads the way through the dark. Elf eyes see in the night.", "After a while you come to a tangle of exposed roots. Sira raises a hand. \"Watch your footing,\" she says. \"From here, the ground cannot be trusted.\""], "百九十四": ["The ancient road was once paved, but three centuries of neglect have half-returned it to wasteland. A cart stands at the roadside, an old man watering his horse.", "You have not gone far when firelight appears ahead. Multiple figures."], "二百三": ["Zal-Karam is larger than you imagined. A black stone structure rises from the middle of the wasteland. Once a complex that spanned an entire city, more than half of it has now sunk underground.", "The mark on your left hand burns with an intensity you have not felt before. The whole building seems to pull at you.", "The main gate is flanked by two stone statues. They do not move. But their eyes are turned toward you."], "二百十五": ["A statue moves. The one on the right. Slowly, with the grinding of stone, its head rotates. The eye sockets begin to glow red. Five metres of stone giant — a sentinel golem.", "Built by the scholars of the Golden Age, so they say. Guarding this place for three hundred years. Its movements are heavy, but they do not stop."], "二百二十九": ["The first basement was once used as research chambers. Long stone corridors with doors on either side. The air is cold and faintly sulphurous. Without a torch, nothing would be visible at all. Ancient script lines the walls, most of it unreadable.", "At the end of the corridor stands a stone tablet. Closer, you see it is covered in names — the names of adventurers who died here. The tablet reaches the ceiling, and the upper portion is already full."], "二百三十五": ["Someone lies in a corner of the corridor. Not recent. The armour has rusted and there is nothing left of the flesh. Something is caught around the neck bone.", "A black necklace. Stone-like material, shaped like a skull. There is text: \"Whoever wears this gains protection against any attack. But the price —\" The rest of the writing is blurred with old blood.", "The necklace is cold. When you lift it, the mark on your hand responds."], "二百四十一": ["The moment the door opens, cold air rushes out. At the centre of the room, a black haze floats. It has the shape of a man, but the outline is blurred. Only the eyes glow — red.", "\"It has been a long time,\" the presence says. The voice is human, but its source is unclear. \"Three hundred years, and no one came. I waited. I waited for you.\"", "\"My name is Vaz. I was once Olt-Val's apprentice. Now — this is what remains of me.\""], "二百五十六": ["\"Wise,\" Vaz says. The haze moves and touches the mark on your left hand. A cold sensation. Then something shifts — the mark faintly glows and fades.", "\"I will show you the path to level two,\" Vaz continues. \"The temple district. There is a star-vein altar there. Pass through it and you can reach the Chamber of Stars. Where Volcaness is.\"", "\"Be warned. The altar draws those who carry the mark. That is its design.\""], "二百六十三": ["\"I refuse,\" you say.", "The sealed scholar Vaz is silent for a time. The light inside the crystal wavers.", "\"Understood,\" Vaz says at last. \"I will not force you. But know this — Volcaness needs the power of your mark. Even without a bargain, you will be pulled toward that place. That much will not change.\""], "二百六十八": ["You press the third stone slab and a section of wall slides silently aside. A hidden passage, barely a metre wide. Typical Golden Age construction.", "At the end, a room. Thick with dust — undisturbed for three hundred years.", "At the back of a shelf, something wrapped in leather. A metal crown, intricately worked, a small gemstone set into the brow. Inside, ancient script: \"Lord Sakambit — last sovereign of the star-vein nation. Symbol of power. Vessel of the curse.\"", "Those who wear this crown gain power beyond human measure. History also calls it \"the Crown of Ruin.\" You pick it up."], "二百七十二": ["Part of the wall is a slightly different colour. A seam, on closer inspection. You press it. The stone slides and a small room opens.", "At the centre, a plinth. On it, a sword — half the length of a normal blade, but with an abnormally thick edge. A Golden Age special alloy. You can tell just from looking that it is something beyond a weapon.", "At the foot of the plinth, old bones. Someone died here."], "二百七十八": ["Level two has different air. Higher humidity, walls faintly damp. The glow stones shift from blue to gold. The floor is covered in some soft material rather than stone.", "You turn a corner in the corridor, and something stands there."], "二百八十四": ["Something stands at the entrance to the temple district. It has the shape of a human, but is not. Two and a half metres tall. Encased in ancient armour, the skin visible through the gaps is stone-grey. Where its eyes should be, red-glowing stones are set.", "It moves."], "二百八十九": ["The altar chamber is wide and the ceiling high. At the centre, a stone plinth. On it, a crystal sphere. Inside it, blue-white light spirals. This is the source of the light visible from outside Zal-Karam.", "As you approach, the mark on your left hand burns fiercely. The sphere is responding to you.", "\"Star-vein Core. The root of the earth's veins beneath Valdea. Those who touch it gain power — or are consumed by it.\""], "二百九十七": ["The ancient guardian is not human-shaped — or so it first appeared. Up close, you understand: it is a human skeletal frame hung with Golden Age armour. Glow stones are set into the joints. That is what drives it.", "It has guarded this place for three hundred years. There is no reason for it to stop."], "三百十二": ["The guardian crumbles and becomes stone fragments. At the moment of the final blow, its whole body blazed with blue-white light. Then, quietly, it fell apart. Crystal shards scattered across the floor and lost their light, becoming ordinary stone.", "\"Thank you,\" Eysar says quietly. The voice fades into the corridor."], "三百二十四": ["The Chamber of Stars is exactly what the name suggests. Countless points of light cover the vast ceiling — a star chart. The sky of Valdea, carved into the stone ceiling as it was. Three hundred years ago, something happened here.", "At the centre of the room, a plinth. Above it, a figure made of light stands."], "三百三十三": ["You keep your sword raised and run for the altar. Presences close in from all around — phantoms born from Volcaness's consciousness. They wear the faces of dead adventurers. You do not know them, but the mark has recorded them.", "The phantoms have substance. Your sword passes through them."], "三百四十一": ["You lower your sword. The presence before you holds no aggression. You can feel that. It is a fragment of Volcaness — the residue of Olt-Val's consciousness, split off in three hundred years of imprisonment. No hatred. No anger. Only exhaustion.", "\"I want to speak with you,\" the voice says. \"I have waited three hundred years. For someone who would listen.\""], "三百五十六": ["You emerge onto the Miyat Road. The oldest trade route in Valdea, running north to south. Golden Age cobblestones remain, but three hundred years of neglect have cracked them throughout, with grass growing between.", "From here, several directions are possible. You must choose."], "三百六十二": ["The gates of the Kingdom of Nifuryum are tall, built from black stone. This is the last great nation of Valdea's Age of Fragments. It maintained organised rule after the Golden Age's collapse and has endured for three centuries.", "\"The mark-bearer has arrived. Bring them immediately,\" the gate captain says."], "三百六十八": ["\"All knowledge of star-vein sorcery discovered in Zal-Karam is to be surrendered to the Kingdom of Nifuryum,\" the king says. \"Those are our conditions.\"", "Gorm clenches his fist. \"That is a heritage. It should not become one nation's property.\"", "The king does not flinch. \"Will you accept the terms or not?\""], "三百七十一": ["The path from the foot of the Tangari Mountains to Tor-Gorm is steep. The Tangari range stretches across the northwest of Valdea, its highest peaks hidden in cloud. Once the sacred homeland of the dwarven people.", "As you climb, a stone settlement comes into view. High walls. An iron gate."], "三百七十五": ["The chieftain is an elderly female dwarf. Her name is Valna. One hundred and fifty years old, they say.", "\"You bear the mark,\" she says. \"Dorm told me. Fifty years ago, he came here and said: one day, someone like this will come. Help them.\"", "\"Dorm was Gorm's brother. Your companion's brother.\""], "三百八十三": ["You press deep into the Tenista-Tenist. This great forest stretches across northern Valdea — three days' walk to cross at its narrowest. In the elven tongue: \"the forest where the stars sing.\"", "Sira leads. No sound from her footsteps. The elven way.", "A forest guardian appears."], "三百九十一": ["\"I go alone,\" you say.", "Gorm frowns. \"Don't be a fool. Three going in is three times the chance of survival over one.\"", "\"I know,\" you say. \"But this is my problem alone. The mark is mine. There is no reason to take you in with me.\"", "Silence."], "三百九十七": ["You run south along the Miyat Road. The wasteland has changed. The grass is dead. The soil is blackened. The colour of the sky is wrong. Clouds gather in a spiral, the centre directly over Zal-Karam.", "Volcaness's power is beginning to leak beyond the ruin. There is no time."], "四百二": ["Every trace of living things has vanished from the wasteland approaching Zal-Karam. No insects. No wind. Not even the sand moves. The vortex in the sky rotates above it like a vast eye.", "The mark on your left hand burns with a heat you have never felt. It is glowing. You cannot stop."], "四百二の二": ["Beyond the hidden passage, there is no stone. The floor is smooth. No seams. Cold to the touch — neither stone nor metal, something else. The walls are the same, their surfaces engraved with fine geometric patterns.", "The patterns glow. As you draw closer, the light intensifies — responding to the mark on your left hand.", "At the centre of the room, something waits."], "四百二の三": ["It did not fall. It sank to its knees, slowly. The mechanical vibration dimmed. The red light flickered and went out.", "After the last blow, it was still for a while. Then its head touched the floor. Quietly, without shattering or dissolving — it simply stopped.", "Something has ended. Silence returns to the corridor."], "四百十五": ["Level three is fundamentally different from the two above. Not stone. Every wall, floor, and ceiling is covered in black crystal. Ancient script flows across the surface, glowing. The air itself stings like electricity against your skin. Star-vein energy, condensed to its limit.", "At the centre, a plinth. A metre of black stone. Nothing rests on it. But around it, the residue of a figure made of light lingers. Someone stood here. Recently.", "\"You came,\" a voice says."], "四百二十八": ["The voice is quiet. Not anger, not hatred, not a threat. The voice of someone exhausted. Three hundred years in the dark, sealed away.", "\"You came,\" the voice says. \"I have waited so long. For one who bears the mark. For you.\"", "The voice belongs to Volcaness. The voice of the man once called Olt-Val."], "四百三十七": ["The sound of Volcaness crumbling. You fall where you stand. Consciousness is far away. Your body protests. But you won.", "\"You still with us?\"", "Gorm's voice. In the wasteland battlefield, the old dwarf's face. Nack and Sira behind him. All three are wounded."], "四百三十七の二": ["You return to Doran three days later. The sky over the wasteland is clear for the first time in three hundred years. The light at Zal-Karam is gone, and the vortex with it. The grass on the horizon turned green overnight. The star-vein power has returned to the veins of the earth.", "You push open the door of \"The Rusty Blade\" and Magda glances at you. Then looks away and silently pours a drink. Sets it at the end of the counter. Nothing else.", "Gorm left a week later for the Tangari Mountains. On the morning of departure, he held out his axe to you. When you refused, he said \"Take it when you come back\" and disappeared into the wasteland. Nack stayed. \"I'll keep dealing information in this town,\" he says. \"At a slightly higher rate. I was a witness.\" Sira returned to the elven settlement. At parting, she looked at your left hand. The mark was gone. \"My three hundred years are over,\" she says. No sentiment on her face. The face of one whose duty is done.", "You set out again. Not because you were called — on your own feet. The back of your left hand feels nothing. Only the memory of that heat remains.", "A new age begins in Valdea."], "四百四十六": ["The sound of Volcaness crumbling. You fall where you stand. Consciousness is far away. Your body protests. But you won.", "\"You still with us?\"", "Gorm's voice. The old dwarf pushed into the Chamber of Stars, breathing hard. Sira followed. \"Idiot,\" Gorm says. \"I never said I'd do it alone.\""], "四百五十五": ["The bargain is struck. The moment Volcaness's power flows into you, the mark on your left hand turns black. Not heat — cold.", "Volcaness is gone. But not gone. Dissolved into you.", "Gorm came down the stairs and looked at your face. His feet stopped. \"...What are you,\" he says. Sira said nothing. She only looked down.", "Weeks later, people spoke of a new ruler who had appeared in the Age of Fragments. The mark of a black crown on the left hand, and eyes shining blue-white. Peace came to Valdea. But it was peace through fear.", "\"You could not become a hero. But you have secured a name that history will record.\""], "四百六十四": ["The power would not stop. The moment the monkey's paw drew the worst result, the mark on your left hand began to spread across your entire body.", "Volcaness was truly destroyed. But you yourself shattered in the act of containing that power. There is no pain. Only light.", "You saved the world. The world will never know."], "四百七十三": ["You fell. Cheek against cold stone, consciousness fading. The last thing you saw was the mark on your left hand. It was still faintly glowing.", "Wind from the wasteland of Valdea blows in through the cracks in the ruin. Your adventure ends here."], "五百一": ["Camping in the wasteland is harder than you expected. The Valdea wasteland is scorching by day and drops sharply at night. There are almost no plants to hold warmth in the ground.", "An abandoned village comes into view. Once a way station on the Miyat Road, from the look of the stone skeletons of buildings that remain."], "五百二": ["There is a human presence in the rubble of the abandoned village. Roofless, floors covered in grass — but the well still works and part of the walls still provides shelter.", "In the shadow of a building, a figure. A woman. Young. Leather armour, a bandage on one arm, moving with difficulty. One look and you know: she came from Zal-Karam."], "五百三": ["You hand over rations or medicine and Rosa takes them without hesitation. \"Thank you,\" she says. \"That helps.\"", "After resting a while, Rosa speaks. \"I'll tell you what I saw in there. Whether you believe it is up to you.\"", "What she saw: a stone tablet deep in level one with fifteen names carved on it — every adventurer who had entered. A record of the dead. And she heard a voice: Return it. She did not know what it wanted returned.", "\"One more thing. There was an old journal in there. Researcher's. On the desk in the third room, left corridor, level one. Might be useful.\""], "五百四": ["You could not spare supplies, but Rosa spoke anyway. \"There is a stone tablet deep in level one,\" she says. \"Every one of my companions' names was on it. The names of every adventurer who went in. But one name — the carving was fresh.\"", "Rosa retightened her bandage. \"In front of that tablet I heard a voice. Return it, it said. I couldn't understand what it meant. But you might.\""], "五百五": ["An old man with a cart stands at the roadside, watering his horse. \"Traveller?\" he says. \"Odd hour to walk this road. Heading to Zal-Karam, I suppose.\""], "五百六": ["The cart carries the following goods."], "五百七": ["\"I've counted more than two hundred adventurers pass through this road in the last month,\" the old man says. \"All heading for Zal-Karam. How many came back... ten at most, I think.\"", "\"Still good for business. The ones going to die spend the most on the way. Money outlasts people.\"", "He replaces the horse's water, matter-of-fact."], "五百八": ["The orc chieftain, named Ragtal, studied you after agreeing to negotiate. \"Word of those who carry the mark has reached even us,\" he says. \"The one who will signal the end of the Age of Fragments. Whether that is welcome — we do not know. But we will not hinder such a person. That is what has been passed down.\"", "Passage is permitted."], "五百九": ["In the forest, Sira stopped. One hand against a tree, she did not move. Gorm turned. Nack's ears twitched.", "\"What is it?\" Gorm says.", "\"...A voice,\" Sira says after a moment. \"The trees are speaking. Old words. They say: hurry.\""], "五百十": ["Nack stopped. Ears straight up. When a goblin's ears go up, he is listening to something — or thinking hard about something.", "\"Hey,\" Nack says. \"I have something to say. Before we go into Zal-Karam. In case I never get another chance to say it.\"", "The ears folded slowly. \"I'm scared. I've been scared from the start. But I wanted to follow you more than I wanted not to be scared. Informant's instinct. Your mark is the real thing.\""], "五百十一": ["Nack looks like he has something on his mind. Walking along the ancient road, his ears twitch repeatedly. His eyes keep drifting toward the cart.", "You speak to him."], "五百十二": ["You turn back to the old man. He is still watering the horse. When you ask about the covered box, his colour changes — but he does not run. A long silence, then a small breath.", "\"You've got the mark. So I'll tell you. That box is Shadow Guild cargo. I'm a carrier. I don't know what's in it. Truly. But I was told to deliver it to Zal-Karam.\""], "六百一": ["You push in from the front and both statues move simultaneously. Eyes flaring red, the grinding of stone carries through the night. Two five-metre sentinel golems advance, moving to block the passage.", "No retreat."], "六百六": ["The laboratory desk is in the third room, far down the corridor. Books and parchment are scattered across it. Most are illegible, but Nack holds up one sheet. \"This is it,\" he says.", "\"Shutdown incantation for the sentinel golems. I can't read the words, but there's a diagram. Push the slabs in this order.\"", "The parchment shows three slab positions."], "六百七": ["Vaz was silent for a long time. The haze shifts. Like one who has, at last, been asked the question no one asked in three hundred years.", "\"I was Olt-Val's apprentice,\" Vaz says. \"When my master changed, I tried to stop him. I could not. I was sealed here. For three hundred years I watched him change.\"", "\"The master that exists now is not Olt-Val. He is Volcaness. But deep within, the residue of my master's consciousness still remains. As long as that persists — perhaps he cannot be fully destroyed.\""], "六百八": ["Gorm stopped at the top of the stairs to level two. Back turned, he slowly tightens his grip on the axe handle — with his right hand, the one with four fingers.", "\"One question,\" you say. \"When did you lose the fifth finger?\"", "\"Fifty years ago,\" Gorm answers. \"Lost it here. I was too afraid to go down then. My brother went alone. Today I go down. Not to get a fifth finger back. To see my brother's name. That is all.\"", "Gorm starts down the stairs."], "六百九": ["Mist drifts through the corridor. From the moment you descended to level two, white haze has clung to the floor, knee-high, swirling with every step. Visibility is not bad, but the floor is invisible. Watch for trapdoors.", "From ahead in the corridor, a sound."], "六百十": ["You bring out the \"Star-Vein Mirror\" and the surface shines blue-white. Reacting to the air of level two. Sira catches her breath. \"That's... it was made here. Three hundred years ago.\"", "You hold the mirror toward the corridor. The mist moves. Something is reflected in it."], "六百十一": ["The corridor is long. The stone floor shows old bloodstains; the walls are covered in countless claw marks. The traces of adventurers who came before — those who turned back here, or gave out here.", "At the far end, a door."], "六百十二": ["After the guardian crumbled, silence returned to the corridor. In the stone fragments, something glows. A crystal detached from the guardian's crown. You pick it up. Warm light in your palm. Undamaged.", "It looks like the same material as the Conceptual Crystal. A piece of the power source that drove the guardian. It may prove useful."], "六百十三": ["Gorm stopped at the entrance to the Chamber of Stars. Looking down from the top of the stairs, not moving. He turned. His eyes, unusually, were unsteady.", "\"From here...\" Gorm says. \"Fifty years ago, right here, I turned back. My brother and I came this far together, and my brother went down alone. I was too afraid.\"", "\"Today I go down.\""], "六百十四": ["Nack's ears were drooping. Unusual — those ears that always perked with curiosity now hung limp.", "\"I stop here,\" he says, small voice. \"Level three... it's not my territory. Not a place an information dealer should go.\"", "\"Wait up here. When you come back, I'll tell you something special. Paid information, though.\"", "The ears lifted, just a little."], "八百一": ["Doran has not changed. You pass through the gate and the familiar smell of dust and tallow grease hits you. You push open the door of \"The Rusty Blade\" and Magda glances at you.", "\"Alive,\" Magda says. That is all. She pours a drink and sets it at the end of the counter."], "八百五": ["On the road, Nack walks beside you and speaks in a low voice. His ears are tilted sideways — nervous, or working up to saying something difficult.", "\"Hey,\" Nack says. \"I've been thinking. Even if you didn't have the mark, I think I'd be here. It's not about the gold. It's not about being an information dealer.\"", "The ears went straight up. \"...Forget I said anything.\""], "八百六": ["By the camp fire, Sira sits beside you. The elf who usually keeps a slight distance is, unusually, close.", "\"Three hundred years,\" Sira says. \"I have waited. I think I finally understand what it meant.\"", "The fire moved. Sira watches it. \"It was to meet you, I think — if you would believe that.\" Without waiting for an answer, she stands."], "八百七": ["The night before departure, you are sitting by the fire when Gorm comes and sits beside you. Nothing said. He watches the fire for a while. When a dwarf sits silently beside you, it means he is working up to saying something.", "\"My brother's name was Dorm,\" Gorm says at last. \"He said: Zal-Karam has answers. I don't know what kind. But there are answers there. So I'm going.\"", "\"Fifty years on, I think my brother was right.\""], "九百三": ["You lower your sword. \"Olt-Val,\" you call.", "Silence spreads. The translucent presence above the altar goes still. The shimmering stops. The blue-white light, for just a moment, shifts to a quiet gold.", "\"...That name has not been spoken for three hundred years,\" the voice says. \"Thank you.\""], "スライム遭遇": ["It is there. Whether \"there\" is the right word, you cannot decide. At the junction of wall and floor where the space seems to distort, it exists. Nearly transparent. Yet something is undeniably present. Its outline does not hold steady. Roughly the size of a human head, but when you reach for it your fingers slide through — the sensation of touching while not touching.", "One line in Vaz's journal: \"Conceptual Hard Slime. A concept without substance that has incorrectly manifested as matter. A single solid strike will destroy it — but landing that strike is the difficulty.\"", "It moves slowly toward you."], "スライム勝利": ["The moment the strike landed, it vanished without a sound. Only the sensation of something being \"resolved\" remains.", "On the floor, a small transparent crystal. The slime's core. Cold to the touch. Hard. Definitely here. Perhaps defeating a concept yields three times the ordinary experience — as one might expect."]}

var _lang = 'ja';

function log(msg){
  var el=document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

function toggleLang(){
  _lang = _lang==='ja'?'en':'ja';
  document.getElementById('lang-btn').textContent = _lang==='ja'?'EN':'JP';
  log('言語切替: '+_lang);
  if(_lang==='ja'){
    // 日本語に戻す：元のHTMLをリストア
    renderPara1();
    return;
  }
  applyParaLang('一');
}

function applyParaLang(pid){
  if(_lang !== 'en') return;
  var en = PARA_EN[pid];
  log('PARA_EN['+pid+']: '+( en ? en.length+'文' : 'なし'));
  if(!en) return;
  var el = document.getElementById(pid);
  if(!el){ log('getElementById('+pid+'): null'); return; }
  var pb = el.querySelector('.para-body');
  if(!pb){ log('.para-body: null'); return; }
  var pTags = pb.querySelectorAll('p');
  log('pタグ数: '+pTags.length);
  en.forEach(function(t,i){
    if(pTags[i]){ pTags[i].textContent = t; log('p['+i+']: OK'); }
  });
  // ボタン英語化
  var btnEls = el.querySelectorAll('.choice-btn');
  var cenArr = CHOICES_EN[pid];
  log('ボタン数: '+btnEls.length+' CHOICES_EN: '+(cenArr?cenArr.length:'なし'));
  if(cenArr) cenArr.forEach(function(t,i){
    if(btnEls[i]) btnEls[i].textContent = t;
  });
}

function renderPara1(){
  document.getElementById('test-output').innerHTML = `<div class="para" id="一"><div class="para-num">◆ <span>一</span></div><div class="para-body"><p>ヴァルデアの荒野に、風が砂埃を巻き上げている。あなたはその風に背を向けながら、地平線に浮かぶ街の輪郭を見た。ドーラン。辺境の交易街だ。かつては北方交易路の要衝として栄えたが、黄金時代の崩壊とともに廃れている。今は荒野の吹き溜まりに過ぎない。</p><p>左手の甲が熱い。紋章だ。生まれた時からそこにある古代の刻印が、今日に限って熱を持っている。ザル＝カラムに近づくほど、熱が増す。三百年前に封印された何かが、あなたを呼んでいる。</p><p>ドーランの街門が見えてくる。門番が二人、槍を構えて立っている。あなたは歩き続ける。</p></div><div class="choices"><button class="choice-btn" onclick="goto('二')">街門の掲示板を確かめてから入る</button><button class="choice-btn" onclick="goto('四十七')">まっすぐ酒場へ向かう</button><button class="choice-btn" onclick="goto('六')">路地に人影を見た</button><button class="choice-btn" onclick="goto('百三十八')">すでに情報は十分だ</button></div></div>`;
}

renderPara1();
log('初期化完了 / パラグラフ◆一を表示');
