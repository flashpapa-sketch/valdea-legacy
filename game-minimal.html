<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヴァルデアの遺産</title>

<style>
body{background:#111;font-family:serif;margin:0;}
.scene{max-width:720px;margin:40px auto;padding:20px;background:#e8dcc2;}
button{width:100%;margin:8px 0;padding:12px;font-size:15px;text-align:left;}
small{opacity:0.6;}
</style>
</head>

<body>
<div id="game"></div>

<script>
// ======================
// ■ 状態
// ======================
const state = {
  stats:{ hp:10, luck:3 },
  flags:{
    helpedOldMan:false,
    lookedBack:false,
    refusedChoice:false,
    secondRun:false
  },
  boss:{ hp:12, pattern:0 }
};

// ======================
// ■ 2周目
// ======================
if(localStorage.getItem("cleared")){
  state.flags.secondRun = true;
}

// ======================
// ■ セーブ（エラーハンドリング強化）
// ======================
function save(scene){
  localStorage.setItem("save", JSON.stringify({scene,state}));
}

function load(){
  try{
    const d = JSON.parse(localStorage.getItem("save"));
    if(d && d.scene){
      Object.assign(state,d.state);
      return d.scene;
    }
  }catch(e){
    console.error("Load failed, starting fresh");
  }
  return 1;
}

// ======================
// ■ 安全な遷移（重要）
// ======================
function safeNext(id){
  if(id >= 100) return 100;
  if(id < 1) return 1;
  return id;
}

// ======================
// ■ 文体（地の文）
// ======================
function narrate(text){
  return text
    .replace(/あなたは/g,"")
    .slice(0,60);
}

// ======================
// ■ ジャクソン文体（選択肢）
// ======================
function formatChoices(scene){

  return scene.choices.map(c=>{

    let t="";

    if(c.condition){
      t = `もし${c.condition}なら、${c.text}しても良い。`;
    }else{
      t = `あなたは${c.text}しても良い。`;
    }

    return {...c, display:t};
  });
}

// ======================
// ■ シーン
// ======================
function getScene(id){

  let text="空気が重い。何かがいる。";

  // 異常：振り返り
  if(id===45){
    text="呼ばれた。後ろからだ。";
    if(state.flags.secondRun) text+=" 知っている。";

    return {
      text,
      choices:[
        {text:"振り返る",effect:()=>state.flags.lookedBack=true,next:46},
        {text:"無視する",next:47}
      ]
    };
  }

  // 老人
  if(id===40){
    return {
      text:"倒れている。息が浅い。",
      choices:[
        {text:"助ける",effect:()=>state.flags.helpedOldMan=true,next:41},
        {text:"無視する",next:42}
      ]
    };
  }

  // 異常：拒否
  if(id===88){
    text="選べと言われる。";
    return {
      text,
      choices:[
        {text:"従う",next:89},
        {text:"拒否する",effect:()=>state.flags.refusedChoice=true,next:90}
      ]
    };
  }

  // 認知破壊
  if(id===96){
    text="気づく。選んでいない。選ばされている。";
    return {
      text,
      choices:[
        {text:"抗う",next:97},
        {text:"受け入れる",next:98}
      ]
    };
  }

  // ボス導入
  if(id===95){
    text="思い出す。あの手だ。";
    if(state.flags.helpedOldMan){
      return {text,next:"boss"};
    }
    return {text,next:100};
  }

  // エンディング
  if(id===100){

    let t="終わる。";

    if(state.flags.refusedChoice){
      t="静かだ。何も起きない。それでいい。";
    }

    if(state.flags.lookedBack){
      t+=" 後ろにいる。";
    }

    if(state.flags.lookedBack && state.flags.secondRun){
      t+=" 最初から決まっていた気がする。";
    }

    localStorage.setItem("cleared","1");

    return {
      text:t,
      choices:[{text:"最初に戻る",next:1}]
    };
  }

  // 後遺症
  if(state.flags.lookedBack){
    text+=" 視線が残っている。";
  }

  // 通常シーン（安全な遷移）
  return {
    text:narrate(text),
    choices:[
      {text:"進む",next:safeNext(id+1)},
      {text:"避ける",next:safeNext(id+2)}
    ]
  };
}

// ======================
// ■ ボス
// ======================
function renderBoss(){

  const el=document.getElementById("game");

  el.innerHTML=`
  <div class="scene">
    <p>来る。</p>
    <p>HP:${state.stats.hp} / BOSS:${state.boss.hp}</p>
    <button onclick="act('attack')">あなたは攻撃しても良い。</button>
    <button onclick="act('defend')">あなたは防御しても良い。</button>
    <button onclick="act('luck')">運を使っても良い。</button>
  </div>`;
}

function act(a){

  state.boss.pattern=Math.floor(Math.random()*3);

  if(a==="attack" && state.boss.pattern!==1){
    state.boss.hp-=3;
  }

  if(a==="defend" && state.boss.pattern===0){
    state.stats.hp-=1;
  }

  if(a==="luck" && state.stats.luck>0){
    state.stats.luck--;
    state.boss.hp-=5;
  }

  if(state.stats.hp<=0) state.stats.hp=0;

  // ボス撃破 or 死亡 → 100へ
  if(state.boss.hp<=0) return render(100);
  if(state.stats.hp<=0) return render(100);

  renderBoss();
}

// ======================
// ■ 描画
// ======================
function render(id){

  const scene=getScene(id);
  save(id);

  if(scene.next==="boss"){
    return renderBoss();
  }

  let html=`<div class="scene">`;
  html+=`<p>${scene.text}</p>`;
  html+=`<small>※選択は取り返しがつかない場合があります</small>`;

  const choices=formatChoices(scene);

  // インデックスベースで安全に選択（重要）
  choices.forEach((c,i)=>{
    html+=`<button onclick="choose(${id},${i})">${c.display}</button>`;
  });

  html+=`</div>`;

  document.getElementById("game").innerHTML=html;
}

// ======================
// ■ 選択（インデックスベース）
// ======================
function choose(id,index){

  const scene=getScene(id);
  
  // 安全性チェック
  if(!scene.choices || !scene.choices[index]){
    console.error("Invalid choice index:", index);
    return;
  }

  const c=scene.choices[index];

  if(c.effect) c.effect();

  render(c.next);
}

// ======================
// ■ 起動
// ======================
render(load());

</script>
</body>
</html>
